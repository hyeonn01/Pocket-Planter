/* ⏱️ 배지/모달의 남은 시간 표시를 1초마다 갱신 (실제 저장은 여기서 하지 않아요 - 성장 계산용 시각과 분리) */
setInterval(()=>{
  if(plantState.isDead) return;
  refreshSpeedState(Date.now());
  updateSpeedBadge();
  updateSpeedModalIfOpen();
}, 1000);

/* ================= 게임 틱 (현실시간 기반 + 배속 보너스) ================= */
function gameTick(){
  if(plantState.isDead) return;

  refreshSpeedState(Date.now());
  rollWeatherIfNewDay();
  applyWeatherVisual();
  writeDiaryIfNewDay();
  ensureDailyMission();
  checkFreeCoinNotification();

  const now = Date.now();
  const elapsedMs = now - plantState.lastRealTick;
  let elapsedDays = elapsedMs / (24*60*60*1000);

  if(plantState.speedMultiplier > 1 && elapsedMs > 0){
    elapsedDays *= FIXED_SPEED_MULTIPLIER;
  }

  if(elapsedDays <= 0){ updateUI(); return; }

  if(plantState.isHarvestable){
    plantState.lastRealTick = now;
    updateUI();
    renderPlant();
    savePlantState();
    return;
  }

  const p = getPersonality();
  const w = getWeatherInfo();
  const rainRelief = w.type === 'rainy' ? 0.5 : 1;
  const dry = (WATER_DRY_PER_DAY[plantState.location] || 10) * elapsedDays * rainRelief * p.dryMul;
  const sunTarget = (SUN_GAIN_PER_DAY[plantState.location] || 8) * w.sunMul;
  const rainGain = (w.type === 'rainy' && OUTDOOR_LOCATIONS.includes(plantState.location)) ? (RAIN_WATER_GAIN_PER_DAY * elapsedDays) : 0;

  plantState.water = clamp(plantState.water - dry + rainGain, 0, 100);
  plantState.sun = clamp(plantState.sun*Math.pow(0.6, elapsedDays) + sunTarget*elapsedDays, 0, 100);

  /* 🩺 죽기 전에 미리 "아파요" 신호를 보내줘요 (표정 변화 + 말풍선 경고, 상태가 나아지면 다시 알려줄 수 있도록 리셋) */
  if(plantState.water <= 20){
    if(!plantState._warnedDry){ showBubble('...몸이 좀 안 좋아요... 물이 필요해요 🥀'); plantState._warnedDry = true; }
    plantState.stats.droughtToday = true;
  } else {
    plantState._warnedDry = false;
  }
  if(plantState.water >= 88){
    if(!plantState._warnedWet){ showBubble('...속이 울렁거려요... 물이 너무 많아요 😖'); plantState._warnedWet = true; }
    plantState.stats.overwaterToday = true;
  } else {
    plantState._warnedWet = false;
  }
  if(plantState.sun >= 90){
    if(!plantState._warnedHot){ showBubble('...너무 뜨거워요... 시원한 곳이 필요해요 🥵'); plantState._warnedHot = true; }
    plantState.stats.overheatToday = true;
  } else {
    plantState._warnedHot = false;
  }
  if(plantState.badWordCount >= 11){
    if(!plantState._warnedSad){ showBubble('...마음이 자꾸 시들어가는 것 같아요...'); plantState._warnedSad = true; }
  } else {
    plantState._warnedSad = false;
  }

  if(plantState.water > 10 && plantState.water < 95){
    let growthGain = GROWTH_PER_DAY * elapsedDays * w.growthMul * p.growthMul;
    const sunFactor = clamp(plantState.sun/50, 0.75, 1.25);
    growthGain *= sunFactor;
    plantState.growth = clamp(plantState.growth + growthGain, 0, 100);
  }

  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.isHarvestable = true;
    plantState.growth = 100;
  }

  if(personalityKey === 'playful' && plantState.water < 35 && Math.random() < p.complainChance){
    showBubble('아오!! 개미때문에 간지러워!!-_-');
  }

  plantState.lastRealTick = now;
  rollNeglectDeathRisk(elapsedDays);
  checkDeathConditions();
  updateUI();
  renderPlant();
  savePlantState();
}

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* 📅 "며칠째"는 실제 달력 날짜 차이로 계산합니다 (시간대/서머타임/밀리초 오차의 영향을 받지 않도록) */
function calcDayNum(startTs, nowTs){
  const start = new Date(startTs);
  const now = new Date(nowTs);
  const startMid = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((nowMid - startMid) / (24*60*60*1000));
  return Math.max(1, diffDays + 1);
}
function getCurrentDayNum(){
  return calcDayNum(plantState.startDate, Date.now());
}

/* ================= 죽음 판정 ================= */
function checkDeathConditions(){
  if(plantState.isHarvestable || plantState.isDead) return;
  if(plantState.water <= 0){
    triggerDeath("물을 너무 오래 주지 않아서 바짝 말라버렸어요. 규칙적으로 물을 주는 게 중요해요.");
  } else if(plantState.water >= 100){
    triggerDeath("뿌리가 계속 물에 잠겨 있어서 과습으로 썩어버렸어요. 가끔은 흙이 마를 시간도 필요해요.");
  } else if(plantState.badWordCount >= 15){
    triggerDeath("차가운 말이 오랫동안 쌓여서 마음이 시들어버렸어요.");
  }
}
/* 🎲 섬세하게 돌보지 않으면(수분/일조가 위험 구간에 머무르면) 극단치(0 또는 100)에
   닿기 전에도 확률적으로 죽을 수 있어요. 위험이 클수록, 그 상태가 오래 유지될수록 확률이 커져요.
   너무 오랫동안 접속하지 않았거나(NEGLECT_MAX_DAYS 이상), 수분/일조가 극단치에 아주 가까웠다면
   확률에 맡기지 않고 무조건 시들게 해서, "다시 들어왔을 때 멀쩡함"을 방지해요. */
const NEGLECT_MAX_DAYS = 5; // 🕒 5일 이상 접속하지 않으면 무조건 시들어요
function rollNeglectDeathRisk(elapsedDays){
  if(plantState.isDead || plantState.isHarvestable || !elapsedDays || elapsedDays <= 0) return;

  // ⏰ 너무 오랫동안 자리를 비웠으면(며칠씩 접속 안 함) 상태와 무관하게 확정적으로 시들어요.
  if(elapsedDays >= NEGLECT_MAX_DAYS){
    triggerDeath(`${Math.floor(elapsedDays)}일 동안이나 찾아오지 않아서 그만 시들어버렸어요. 너무 오래 자리를 비우면 안 돼요!`);
    return;
  }
  // 💧 수분/일조가 극단치에 아주 가까운 채로 하루 이상 방치되면(=거의 0/100), 확률이 아니라 확정적으로 시들어요.
  if(elapsedDays >= 1){
    if(plantState.water <= 3){
      triggerDeath('물을 너무 오랫동안 주지 않아서 완전히 바짝 말라버렸어요. 조금 더 자주 확인해주세요.');
      return;
    }
    if(plantState.water >= 97){
      triggerDeath('물이 계속 너무 많이 고여 있어서 뿌리가 완전히 썩어버렸어요. 흙이 마를 시간도 필요해요.');
      return;
    }
    if(plantState.sun >= 97){
      triggerDeath('너무 오랫동안 강한 햇빛을 그대로 받아서 잎이 완전히 타버렸어요. 뜨거울 땐 그늘로 옮겨주세요.');
      return;
    }
  }

  let dailyRisk = 0;
  let reason = null;
  if(plantState.water <= 15){
    const severity = clamp((15 - plantState.water) / 15, 0, 1);
    const r = 0.15 + 0.35 * severity;
    if(r > dailyRisk){ dailyRisk = r; reason = 'drought'; }
  }
  if(plantState.water >= 85){
    const severity = clamp((plantState.water - 85) / 15, 0, 1);
    const r = 0.15 + 0.35 * severity;
    if(r > dailyRisk){ dailyRisk = r; reason = 'overwater'; }
  }
  if(plantState.sun >= 90){
    const severity = clamp((plantState.sun - 90) / 10, 0, 1);
    const r = 0.10 + 0.25 * severity;
    if(r > dailyRisk){ dailyRisk = r; reason = 'overheat'; }
  }
  if(!reason) return;
  const prob = 1 - Math.pow(1 - dailyRisk, elapsedDays);
  if(Math.random() < prob){
    const reasons = {
      drought: '물을 오랫동안 주지 않아서 뿌리가 바짝 말라버렸어요. 흙이 마르기 전에 자주 물을 확인해주세요.',
      overwater: '물이 계속 너무 많아서 뿌리가 과습으로 썩어버렸어요. 물을 준 뒤엔 흙이 마를 시간도 줘야 해요.',
      overheat: '햇빛을 너무 오래, 너무 강하게 받아서 잎이 타버렸어요. 뜨거운 날엔 그늘로 옮겨주세요.'
    };
    triggerDeath(reasons[reason]);
  }
}
function triggerDeath(reason){
  plantState.isDead = true;
  plantState.deathReason = reason;
  document.getElementById('death-reason').innerText = reason;
  document.getElementById('game-over-screen').style.display = 'flex';
  renderReviveArea();
  savePlantState();
}
/* 💊 코인으로 되살리기: 1900원부터 시작해서, 같은 식물을 되살릴 때마다 다음 비용이 2배가 돼요 (1900 → 3800 → 7600 ...) */
function getReviveCost(){
  return 1900 * Math.pow(2, plantState.reviveCount || 0);
}
function renderReviveArea(){
  const area = document.getElementById('revive-area');
  if(!area) return;
  const cost = getReviveCost();
  const coins = Math.floor(plantState.coins || 0);
  area.innerHTML = `
    <button class="revive-btn" onclick="revivePlant()" ${coins < cost ? 'disabled' : ''}>💊 코인으로 되살리기 (${cost}원)</button>
    <div class="revive-balance">보유 코인 ${coins}원${coins < cost ? ' · 코인이 부족해요' : ''}</div>
  `;
}
function revivePlant(){
  const cost = getReviveCost();
  const coins = Math.floor(plantState.coins || 0);
  if(coins < cost){
    showInfoToast(`${COIN_ICON_HTML} 코인이 부족해요!`);
    return;
  }
  const ok = confirm(`${cost}원을 써서 ${plantName}을(를) 되살릴까요?\n\n다음에 또 죽으면 되살리기 비용이 ${cost*2}원으로 올라가요.`);
  if(!ok) return;
  plantState.coins = coins - cost;
  plantState.reviveCount = (plantState.reviveCount || 0) + 1;
  plantState.isDead = false;
  plantState.deathReason = '';
  // 🌱 다시 죽지 않도록 위험했던 수치를 안전한 값으로 되돌려줘요
  plantState.water = 50;
  plantState.sun = 50;
  plantState.badWordCount = Math.min(plantState.badWordCount, 5);
  plantState.stats.droughtToday = false;
  plantState.stats.overwaterToday = false;
  plantState.stats.overheatToday = false;
  plantState._warnedDry = false;
  plantState._warnedWet = false;
  plantState._warnedHot = false;
  plantState._warnedSad = false;
  plantState.lastRealTick = Date.now();
  document.getElementById('game-over-screen').style.display = 'none';
  showBubble('다시 살아났어요! 이번엔 더 조심히 돌봐주세요 🌱');
  updateCoinUI();
  updateUI();
  renderPlant();
  savePlantState();
}
function restartToGardenSelect(){
  safeRemove(SAVE_KEY);
  safeRemove(PLANTNAME_KEY);
  safeRemove(PERSONALITY_KEY_STORAGE);
  plantSlots = plantSlots.filter(s=>s.id!==currentSlotId);
  safeSet(SLOTS_KEY, JSON.stringify(plantSlots));
  if(plantSlots.length > 0){
    // 🌱 아직 키우고 있는 다른 식물이 있으면 그 식물 화면으로 이동해요
    safeSet(CURRENT_SLOT_KEY, String(plantSlots[0].id));
    window.location.reload();
  } else {
    safeRemove(`miniGarden_currentPlantDir_${nickname}`);
    window.location.href = '../../index.html';
  }
}

/* ⚙️🌱 설정 화면에서 "새로 키우기"를 누르면, 죽음/수확과 무관하게 지금 키우고 있는
   식물의 저장 데이터(성장 기록·수확 바구니·일기·업적·이름·성격)를 전부 지우고
   같은 슬롯을 다시 씨앗부터 시작할 수 있는 상태로 되돌려요. 되돌릴 수 없으니 반드시 확인을 받습니다. */
function requestRestartCurrentPlant(){
  const ok = confirm(
    `정말 "${plantName}"(${PLANT_INFO.name}) 키우기를 그만두고 처음부터 새로 시작할까요?\n\n` +
    `지금까지 쌓인 성장 기록, 수확 바구니, 일기, 업적이 모두 사라지고 되돌릴 수 없어요.`
  );
  if(!ok) return;
  closeModal();
  restartToGardenSelect();
}

/* ================= UI 업데이트 ================= */
function updateUI(){
  ensureDailyMission();
  updateMissionUI();

  document.getElementById('txt-growth').innerText = Math.floor(plantState.growth);
  document.getElementById('txt-water').innerText = Math.floor(plantState.water);
  document.getElementById('txt-sun').innerText = Math.floor(plantState.sun);

  document.getElementById('bar-growth').style.width = plantState.growth + '%';
  document.getElementById('bar-water').style.width = plantState.water + '%';
  document.getElementById('bar-sun').style.width = plantState.sun + '%';

  const waterBadge = document.getElementById('water-full-badge');
  if(waterBadge) waterBadge.style.display = plantState.water >= WATER_CAP ? 'inline' : 'none';

  const dayNum = getCurrentDayNum();
  const d = new Date();
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('game-date-display').innerText = `${dateStr} (${dayNum}일차)`;

  const stageInfo = getStageInfo(plantState.growth);
  document.getElementById('view-stage-text').innerText = stageInfo.label;

  // 🔔 성장 단계가 올라갈 때마다(씨앗 → ... → 수확 가능) 알림을 한 번씩 보내줘요
  if(!plantState.isDead){
    if(typeof plantState.lastNotifiedStageIdx !== 'number'){
      plantState.lastNotifiedStageIdx = stageInfo.idx; // 최초 로드시엔 알림 없이 기준값만 설정
    } else if(stageInfo.idx > plantState.lastNotifiedStageIdx){
      plantState.lastNotifiedStageIdx = stageInfo.idx;
      const isHarvest = stageInfo.idx === 11;
      sendLocalNotification(
        isHarvest ? `${PLANT_INFO.icon} ${plantName}이(가) 수확 가능해요!` : `🌱 ${plantName}이(가) 자랐어요!`,
        isHarvest ? `${PLANT_INFO.name}가 다 익었어요. 지금 수확해보세요!` : `이제 '${stageInfo.label}' 단계예요. 정원을 확인해보세요.`,
        'stage-change'
      );
      savePlantStateSoft();
    }
  }

  const hint = document.getElementById('harvest-hint');
  const svg = document.getElementById('plant-svg');
  if(plantState.isHarvestable && !plantState.isDead){
    hint.classList.add('show');
    svg.classList.add('harvest-pulse');
  } else {
    hint.classList.remove('show');
    svg.classList.remove('harvest-pulse');
  }

  updateBasketBadge();
  updateCoinUI();
  updateLevelUI();
  refreshDailyFreeCoinButton();
  document.getElementById('badword-mini-count').innerText = plantState.badWordCount;
}

function updateCoinUI(){
  const coinEl = document.getElementById('coin-total');
  if(coinEl) coinEl.innerText = Math.floor(plantState.coins || 0);
}
function getDailyFreeCoinRemainingMs(){
  // 🍀 자정(달력 날짜) 기준으로 초기화돼요: 오늘 이미 받았다면 다음 자정까지 남은 시간을 보여줘요.
  const today = getDayIndex(Date.now());
  if(plantState.lastFreeCoinClaimDay !== today) return 0;
  const now = new Date();
  const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
  return Math.max(0, nextMidnight.getTime() - now.getTime());
}
function refreshDailyFreeCoinButton(){
  const btn = document.getElementById('daily-free-coin-btn');
  if(!btn) return;
  btn.classList.toggle('hidden', getDailyFreeCoinRemainingMs() > 0);
}
function scheduleNextFloatingCoinTime(baseTs){
  const base = typeof baseTs === 'number' ? baseTs : Date.now();
  plantState.nextFloatingCoinAt = base + FLOATING_COIN_MIN_DELAY_MS + Math.random() * (FLOATING_COIN_MAX_DELAY_MS - FLOATING_COIN_MIN_DELAY_MS);
}
function initFloatingCoinSystem(){
  if(typeof plantState.nextFloatingCoinAt !== 'number' || !plantState.nextFloatingCoinAt){
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
  }
  clearInterval(initFloatingCoinSystem._timer);
  initFloatingCoinSystem._timer = setInterval(checkFloatingCoinSpawn, 30 * 1000);
  checkFloatingCoinSpawn();
}
function checkFloatingCoinSpawn(){
  if(document.hidden || plantState.isDead) return;
  if(typeof plantState.nextFloatingCoinAt !== 'number' || !plantState.nextFloatingCoinAt){
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
    return;
  }
  if(Date.now() >= plantState.nextFloatingCoinAt){
    spawnFloatingCoin();
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
  }
}
function spawnFloatingCoin(){
  const layer = document.getElementById('floating-coin-layer');
  if(!layer || layer.querySelector('.floating-coin')) return;
  const coin = document.createElement('button');
  coin.type = 'button';
  coin.className = 'floating-coin';
  coin.innerText = '₩';
  coin.style.left = (Math.random() * 68 + 10) + '%';
  coin.style.top = (Math.random() * 44 + 18) + '%';
  coin.addEventListener('click', function(ev){
    ev.stopPropagation();
    coin.remove();
    plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + FLOATING_COIN_VALUE);
    plantState.lifeCoinsEarned = (plantState.lifeCoinsEarned || 0) + FLOATING_COIN_VALUE;
    updateCoinUI();
    showInfoToast(`${COIN_ICON_HTML} 랜덤 코인 +${FLOATING_COIN_VALUE}원 획득!`);
    checkLevelUp();
    savePlantStateSoft();
  });
  layer.appendChild(coin);
  setTimeout(()=>{ if(coin.isConnected) coin.remove(); }, 18000);
}
function claimDailyFreeCoin(){
  if(getDailyFreeCoinRemainingMs() > 0) return;
  const btn = document.getElementById('daily-free-coin-btn');
  if(btn) btn.classList.add('shake');
  const reward = Math.floor(Math.random() * (DAILY_FREE_COIN_MAX - DAILY_FREE_COIN_MIN + 1)) + DAILY_FREE_COIN_MIN;
  setTimeout(()=>{
    if(btn) btn.classList.remove('shake');
    plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + reward);
    plantState.lifeCoinsEarned = (plantState.lifeCoinsEarned || 0) + reward;
    plantState.lastFreeCoinClaimAt = Date.now();
    plantState.lastFreeCoinClaimDay = getDayIndex(Date.now());
    updateCoinUI();
    refreshDailyFreeCoinButton();
    showInfoToast(`🍀 오늘의 무료 코인! +${reward}원 획득했어요!`);
    checkLevelUp();
    savePlantStateSoft();
  }, 420);
}

/* ================= 🃏 하이로우 (High-Low) 미니게임 =================
   카드 하나가 공개되고, 다음 카드가 더 높을지/낮을지 맞히는 게임.
   맞힐 때마다 배당이 2배씩 늘어나며, 언제든 챙기고 멈출 수 있어요. */
const HL_BET_OPTIONS = [10, 50, 100, 500];
let hlState = null; // { bet, multiplier, current, busy }

function hlDrawCard(){
  return Math.floor(Math.random() * 13) + 1; // 1(A) ~ 13(K)
}
function hlCardLabel(v){
  const map = { 1:'A', 11:'J', 12:'Q', 13:'K' };
  return map[v] || String(v);
}

function openHighLowGame(){
  hlState = null;
  document.getElementById('modal-content-area').innerHTML = renderHighLowRulesScreen();
}

/* 🔎 게임 시작 전, 카드 알파벳(J/Q/K) 의미와 규칙을 먼저 보여주는 설명 화면 */
function renderHighLowRulesScreen(){
  return `
    <div class="modal-title">🃏 하이로우 게임 방법</div>
    <p class="hl-rules-text">카드 한 장이 먼저 공개돼요.<br>다음 카드가 그보다 <b>높을지 낮을지</b> 맞히면 코인을 얻는 게임이에요!</p>
    <div class="hl-rules-order">
      <div class="hl-rules-order-title">카드 숫자 순서 (낮음 → 높음)</div>
      <div class="hl-rules-order-row">
        <span class="hl-order-chip">A<small>(1)</small></span>
        <span class="hl-order-arrow">→</span>
        <span class="hl-order-chip">2~10</span>
        <span class="hl-order-arrow">→</span>
        <span class="hl-order-chip">J<small>(11)</small></span>
        <span class="hl-order-arrow">→</span>
        <span class="hl-order-chip">Q<small>(12)</small></span>
        <span class="hl-order-arrow">→</span>
        <span class="hl-order-chip">K<small>(13)</small></span>
      </div>
    </div>
    <ul class="hl-rules-list">
      <li><b>A</b>는 가장 낮은 숫자, <b>J·Q·K</b>는 숫자 11·12·13을 뜻하는 가장 높은 카드예요.</li>
      <li>맞히면 배당이 <b>2배씩</b> 계속 쌓여요.</li>
      <li>같은 숫자가 나오면(동점) 승패 없이 카드만 다시 뽑아요.</li>
      <li>틀리면 배팅한 코인을 모두 잃어요.</li>
      <li>언제든 <b>"챙기고 그만하기"</b>로 지금까지 딴 코인을 받을 수 있어요.</li>
    </ul>
    <button class="action-btn pastel-mint" onclick="showHighLowBetScreen()">시작하기</button>
    <button class="close-modal-btn" onclick="openModal('minigame')">← 목록으로</button>
  `;
}

function showHighLowBetScreen(){
  document.getElementById('modal-content-area').innerHTML = renderHighLowBetScreen();
}

function renderHighLowBetScreen(){
  const coins = Math.floor(plantState.coins || 0);
  return `
    <div class="modal-title">하이로우</div>
    <p class="modal-sub">🃏 카드가 다음 카드보다 높을지 낮을지 맞혀보세요!<br>맞힐 때마다 코인이 2배씩 늘어나요.</p>
    <span class="hl-help-link" onclick="document.getElementById('modal-content-area').innerHTML = renderHighLowRulesScreen()">❔ 게임 방법 다시 보기</span>
    <div class="coin-balance-card">보유 코인 · ${COIN_ICON_HTML} ${coins}원</div>
    <div class="modal-options-grid">
      ${HL_BET_OPTIONS.map(b => `
        <div class="modal-opt-btn ${coins < b ? 'disabled' : ''}" ${coins < b ? '' : `onclick="beginHighLow(${b})"`}>
          ${b}원 배팅
        </div>`).join('')}
    </div>
    <button class="close-modal-btn" onclick="openModal('minigame')">← 목록으로</button>
  `;
}

function beginHighLow(bet){
  const coins = Math.floor(plantState.coins || 0);
  if(coins < bet){
    showInfoToast(`${COIN_ICON_HTML} 코인이 부족해요!`);
    return;
  }
  plantState.coins = coins - bet;
  updateCoinUI();
  savePlantStateSoft();
  hlState = { bet, multiplier: 1, current: hlDrawCard(), busy: false };
  renderHighLowGameScreen();
}

function renderHighLowGameScreen(msg){
  if(!hlState) return;
  const potential = hlState.bet * hlState.multiplier;
  const nextPotential = hlState.bet * hlState.multiplier * 2;
  document.getElementById('modal-content-area').innerHTML = `
    <div class="modal-title">하이로우</div>
    ${msg ? `<p class="hl-msg">${msg}</p>` : ''}
    <div class="hl-card-row">
      <div class="hl-card">${hlCardLabel(hlState.current)}</div>
      <div class="hl-vs">VS</div>
      <div class="hl-card hl-card-back">?</div>
    </div>
    <div class="hl-multiplier">예상 획득 (현재 배당 x2) = ${COIN_ICON_HTML} ${nextPotential}원</div>
    <div class="modal-options-grid hl-guess-row">
      <div class="modal-opt-btn hl-btn-low" onclick="guessHighLow('low')">낮다</div>
      <div class="modal-opt-btn hl-btn-high" onclick="guessHighLow('high')">높다</div>
    </div>
    ${hlState.multiplier > 1 ? `<button class="action-btn pastel-yellow" onclick="collectHighLow()">${COIN_ICON_HTML} ${potential}원 챙기고 그만하기</button>` : ''}
    <button class="close-modal-btn" onclick="forfeitHighLow()">그만두기 (배팅금 포기)</button>
  `;
}

function guessHighLow(direction){
  if(!hlState || hlState.busy) return;
  hlState.busy = true;
  const next = hlDrawCard();
  const cur = hlState.current;

  if(next === cur){
    // 동점은 승패에 영향 없이 카드만 다시 뽑아요 (다만 무슨 카드였는지는 보여주고 넘어가요)
    hlState.pendingType = 'tie';
    hlState.revealValue = next;
    renderHighLowRevealScreen();
    return;
  }

  const isCorrect = (next > cur && direction === 'high') || (next < cur && direction === 'low');
  hlState.pendingType = isCorrect ? 'win' : 'lose';
  hlState.revealValue = next;
  renderHighLowRevealScreen();
}

/* 🔎 다음 카드를 뒤집어 보여주고, 사용자가 결과를 확인한 뒤 직접 "다음으로"를 눌러야 진행돼요 */
function renderHighLowRevealScreen(){
  if(!hlState) return;
  const cur = hlState.current;
  const next = hlState.revealValue;
  const type = hlState.pendingType;
  let msg, cardClass;
  if(type === 'tie'){
    msg = `동점이었어요! (${hlCardLabel(next)}) 카드를 다시 뽑을게요.`;
    cardClass = '';
  } else if(type === 'win'){
    msg = `정답! ${hlCardLabel(next)} 카드였어요!`;
    cardClass = 'hl-card-win';
  } else {
    msg = `아쉬워요! ${hlCardLabel(next)} 카드였어요.`;
    cardClass = 'hl-card-lose';
  }
  document.getElementById('modal-content-area').innerHTML = `
    <div class="modal-title">하이로우</div>
    <p class="hl-msg">${msg}</p>
    <div class="hl-card-row">
      <div class="hl-card">${hlCardLabel(cur)}</div>
      <div class="hl-vs">VS</div>
      <div class="hl-card hl-card-reveal ${cardClass}">${hlCardLabel(next)}</div>
    </div>
    <button class="action-btn pastel-mint" onclick="proceedAfterHighLowReveal()">다음으로</button>
  `;
}

/* 카드 확인 후 사용자가 "다음으로"를 누르면 그제서야 다음 라운드/결과 화면으로 넘어가요 */
function proceedAfterHighLowReveal(){
  if(!hlState) return;
  const type = hlState.pendingType;
  const next = hlState.revealValue;
  hlState.pendingType = null;
  hlState.revealValue = null;

  if(type === 'tie'){
    hlState.current = hlDrawCard();
    hlState.busy = false;
    renderHighLowGameScreen();
  } else if(type === 'win'){
    hlState.multiplier *= 2;
    hlState.current = next;
    hlState.busy = false;
    renderHighLowGameScreen(`정답! ${hlCardLabel(next)} 카드였어요!`);
  } else {
    const lost = hlState.bet;
    hlState = null;
    renderHighLowResultScreen(false, lost, hlCardLabel(next));
  }
}

function collectHighLow(){
  if(!hlState) return;
  const won = hlState.bet * hlState.multiplier;
  plantState.coins = Math.floor(plantState.coins || 0) + won;
  updateCoinUI();
  savePlantStateSoft();
  hlState = null;
  renderHighLowResultScreen(true, won);
}

function forfeitHighLow(){
  hlState = null;
  closeModal();
}

function renderHighLowResultScreen(isWin, amount, revealedCardLabel){
  document.getElementById('modal-content-area').innerHTML = `
    <div class="modal-title">${isWin ? '🎉 획득 완료!' : '😢 아쉬워요'}</div>
    <p class="modal-sub">
      ${isWin
        ? `${COIN_ICON_HTML} ${amount}원을 획득했어요!`
        : `${revealedCardLabel ? `카드는 ${revealedCardLabel}였어요.<br>` : ''}배팅한 ${amount}원을 잃었어요.`}
    </p>
    <button class="action-btn pastel-mint" onclick="showHighLowBetScreen()">다시 도전하기</button>
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
  `;
  showInfoToast(isWin ? `${COIN_ICON_HTML} +${amount}원 획득!` : `${COIN_ICON_HTML} -${amount}원...`);
}

/* ================= 🂡 미니 블랙잭 (21 넘지 않기) 미니게임 =================
   카드를 계속 받을지(Hit) 그만 받을지(Stand) 선택하는 게임.
   카드 합계가 낮을 때(안전)는 배당이 조금, 합계가 높을 때(위험)는 배당이 크게 올라요.
   21을 넘기면(버스트) 배팅금을 모두 잃고, 언제든 "그만하기"로 지금까지의 배당을 챙길 수 있어요. */
const BJ_BET_OPTIONS = [10, 50, 100, 500];
let bjState = null; // { bet, multiplier, sum, cards, busy, pendingType, pendingCard, pendingSum, pendingFactor }

// A=1, 2~10은 숫자 그대로, J·Q·K는 10으로 계산 (실제 블랙잭 규칙과 동일)
function bjCardValue(v){
  if(v === 1) return 1;
  if(v >= 11) return 10;
  return v;
}
// 현재 합계(카드를 받기 전 기준)가 높을수록(위험할수록) 다음 배당 상승폭이 커져요
function bjNextMultiplierFactor(sumBeforeHit){
  if(sumBeforeHit <= 11) return 1.3;  // 어떤 카드를 받아도 버스트 불가능한 안전 구간
  if(sumBeforeHit <= 16) return 1.6;  // 약간의 버스트 위험이 있는 구간
  return 2.2;                          // 버스트 위험이 큰 고위험 구간
}

      <li>언제든 <b>"그만하기(Stand)"</b>를 눌러 지금까지의 배당을 그대로 챙길 수 있어요.</li>

}

function beginBlackjack(bet){
  const coins = Math.floor(plantState.coins || 0);
  if(coins < bet){
    showInfoToast(`${COIN_ICON_HTML} 코인이 부족해요!`);
    return;
  }
  plantState.coins = coins - bet;
  updateCoinUI();
  savePlantStateSoft();
  const firstCard = hlDrawCard();
  bjState = { bet, multiplier: 1, sum: bjCardValue(firstCard), cards: [firstCard], busy: false };
  renderBlackjackGameScreen();
}

function renderBlackjackGameScreen(msg){
  if(!bjState) return;
  const potential = Math.floor(bjState.bet * bjState.multiplier);
  const cardsHtml = bjState.cards.map(c => `<div class="bj-card">${hlCardLabel(c)}</div>`).join('');
  document.getElementById('modal-content-area').innerHTML = `
    <div class="modal-title">미니 블랙잭</div>
    ${msg ? `<p class="hl-msg">${msg}</p>` : ''}
    <div class="bj-card-row">${cardsHtml}</div>
    <div class="bj-sum-box">현재 합계 · <b>${bjState.sum}</b> / 21</div>
    <div class="bj-multiplier">지금 그만하면 = ${COIN_ICON_HTML} ${potential}원</div>
    <div class="modal-options-grid bj-guess-row">
      <div class="modal-opt-btn bj-btn-hit" onclick="hitBlackjack()">카드 받기</div>
      <div class="modal-opt-btn bj-btn-stand" onclick="standBlackjack()">그만하기</div>
    </div>
  `;
}

function hitBlackjack(){
  if(!bjState || bjState.busy) return;
  bjState.busy = true;
  const card = hlDrawCard();
  const val = bjCardValue(card);
  const newSum = bjState.sum + val;

  if(newSum > 21){
    bjState.pendingType = 'bust';
  } else if(newSum === 21){
    bjState.pendingType = 'blackjack';
    bjState.pendingFactor = bjNextMultiplierFactor(bjState.sum);
  } else {
    bjState.pendingType = 'safe';
    bjState.pendingFactor = bjNextMultiplierFactor(bjState.sum);
  }
  bjState.pendingCard = card;
  bjState.pendingSum = newSum;
  renderBlackjackRevealScreen();
}

/* 🔎 새로 받은 카드를 보여주고, 사용자가 결과를 확인한 뒤 직접 "다음으로"를 눌러야 진행돼요 */
function renderBlackjackRevealScreen(){
  if(!bjState) return;
  const type = bjState.pendingType;
  const card = bjState.pendingCard;
  const newSum = bjState.pendingSum;
  let msg, cardClass;
  if(type === 'bust'){
    msg = `버스트! ${hlCardLabel(card)} 카드로 합계가 ${newSum}이 되어 21을 넘었어요.`;
    cardClass = 'bj-card-lose';
  } else if(type === 'blackjack'){
    msg = `${hlCardLabel(card)} 카드로 정확히 21! 자동으로 배당을 챙겨드릴게요.`;
    cardClass = 'bj-card-win';
  } else {
    msg = `${hlCardLabel(card)} 카드를 받았어요! 합계 ${newSum}`;
    cardClass = '';
  }
  const cardsHtml = bjState.cards.map(c => `<div class="bj-card">${hlCardLabel(c)}</div>`).join('')
    + `<div class="bj-card bj-card-new ${cardClass}">${hlCardLabel(card)}</div>`;
  document.getElementById('modal-content-area').innerHTML = `
    <div class="modal-title">미니 블랙잭</div>
    <p class="hl-msg">${msg}</p>
    <div class="bj-card-row">${cardsHtml}</div>
    <button class="action-btn pastel-mint" onclick="proceedAfterBlackjackReveal()">다음으로</button>
  `;
}

/* 카드 확인 후 사용자가 "다음으로"를 누르면 그제서야 결과를 반영해요 */
function proceedAfterBlackjackReveal(){
  if(!bjState) return;
  const type = bjState.pendingType;
  const card = bjState.pendingCard;
  const newSum = bjState.pendingSum;

  if(type === 'bust'){
    const lost = bjState.bet;
    bjState = null;
    renderBlackjackResultScreen(false, lost, `합계 ${newSum}(버스트)`);
    return;
  }

  bjState.multiplier *= bjState.pendingFactor;
  bjState.sum = newSum;
  bjState.cards.push(card);
  bjState.pendingType = null;
  bjState.pendingCard = null;

  if(type === 'blackjack'){
    const won = Math.floor(bjState.bet * bjState.multiplier);
    plantState.coins = Math.floor(plantState.coins || 0) + won;
    updateCoinUI();
    savePlantStateSoft();
    bjState = null;
    renderBlackjackResultScreen(true, won, '21 달성!');
    return;
  }

  bjState.busy = false;
  renderBlackjackGameScreen();
}

function standBlackjack(){
  if(!bjState) return;
  const won = Math.floor(bjState.bet * bjState.multiplier);
  plantState.coins = Math.floor(plantState.coins || 0) + won;
  updateCoinUI();
  savePlantStateSoft();
  bjState = null;
  renderBlackjackResultScreen(true, won);
}

  showInfoToast(isWin ? `${COIN_ICON_HTML} +${amount}원 획득!` : `${COIN_ICON_HTML} -${amount}원...`);
}

function buyShopItem(key){
  const item = SHOP_ITEMS.find(v=>v.key === key);
  if(!item) return;
  const coins = Math.floor(plantState.coins || 0);
  if(coins < item.cost){
    showInfoToast(`${COIN_ICON_HTML} 코인이 부족해요!`);
    return;
  }
  if(key === 'dehumidifier' && plantState.water <= 15){
    showInfoToast('💧 지금은 수분제거가 필요 없어요.');
    return;
  }
  // 🛑 구매 전 확인: 코인은 즉시 차감되고 아이템은 바로 식물에게 사용되니, 실수 구매를 막기 위해 한 번 더 확인받아요.
  const ok = confirm(`"${item.title}"(${item.cost}원)를 구매할까요?\n\n(바로 ${plantName}에게 사용돼요).`);
  if(!ok) return;
  plantState.coins = coins - item.cost;
  if(key === 'nutrient'){
    plantState.growth = clamp(plantState.growth + 3, 0, 100);
    plantState.water = clamp(plantState.water + 8, 0, WATER_CAP);
    plantState.sun = clamp(plantState.sun + 8, 0, 100);
    showBubble('영양이 쏙쏙 들어와요!');
  } else if(key === 'dehumidifier'){
    plantState.water = clamp(plantState.water - 25, 0, 100);
    showBubble('과한 수분이 정리돼서 한결 가벼워요!');
  } else if(key === 'sunlight'){
    plantState.sun = clamp(plantState.sun + 25, 0, 100);
    showBubble('햇살을 듬뿍 받았어요!');
  } else if(key === 'growth_booster'){
    plantState.growth = clamp(plantState.growth + 12, 0, 100);
    showBubble('쑥쑥 자랄 힘이 생겼어요!');
  }
  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.growth = 100;
    plantState.isHarvestable = true;
  }
  updateUI();
  renderPlant();
  checkDeathConditions();
  const content = document.getElementById('modal-content-area');
  if(content) content.innerHTML = renderShopModal();
  savePlantState();
}

function updateBasketBadge(){
  const badge = document.getElementById('basket-badge');
  const total = plantState.harvestedBasket.length;
  const unseen = Math.max(0, total - (plantState.basketSeenCount || 0));
  if(unseen > 0){
    badge.style.display = 'flex';
    badge.innerText = unseen > 99 ? '99+' : unseen;
  } else {
    badge.style.display = 'none';
  }
}

/* ================= 성장 단계 (12단계) ================= */
function getStageInfo(growth){
  const idx = Math.min(11, Math.floor(growth/(100/12)));
  const labels = PLANT_INFO.stageLabels;
  const label = idx === 11 ? `${PLANT_INFO.icon} ${labels[idx]}` : labels[idx];
  return { idx, label };
}

function renderPlant(){
  const { idx } = getStageInfo(plantState.growth);
  const svg = document.getElementById('plant-svg');
  svg.innerHTML = buildPlantSVG(idx) + buildPotFace();
}

function getPotMood(){
  if(tempMoodOverride) return tempMoodOverride;
  if(plantState.isDead) return 'dead';
  if(plantState.isHarvestable) return 'happy';
  if(plantState.badWordCount >= 14) return 'sad';
  if(plantState.water <= 15) return 'thirsty';
  if(plantState.water >= 90) return 'soggy';
  if(plantState.sun >= 92) return 'hot';
  if(plantState.sun <= 15) return 'sleepy';
  if(plantState.water >= 55 && plantState.water <= 85 && plantState.sun >= 40) return 'content';
  return 'neutral';
}

function buildPlantSVG(stage){
const isGrape = PLANT_TYPE === 'grape';
const isBanana = PLANT_TYPE === 'banana';
const isTangerine = PLANT_TYPE === 'tangerine';
const isTomato = PLANT_TYPE === 'tomato' || (!isGrape && !isBanana && !isTangerine); // 기본값 안전장치
const stemH = 14 + stage*15;
const baseY = 220;
const topY = baseY - stemH;
const leafCount = Math.min(8, stage+1);
const hasFlower = stage === 6 || stage === 7;
const fruitCount = stage >= 8 ? Math.min(4, stage - 6) : 0;
const fruitColorUnripe = PLANT_INFO.fruitColorUnripe;
const fruitColorMid = PLANT_INFO.fruitColorMid;
const fruitColorRipe = PLANT_INFO.fruitColorRipe;
const fruitColorRipeDeep = PLANT_INFO.fruitColorRipeDeep;
const fruitColor = stage <= 9 ? fruitColorUnripe : stage === 10 ? fruitColorMid : fruitColorRipe;
const fruitRipe = stage >= 11;

let leaves = '';
for(let i=0;i<leafCount;i++){
const t = i/(leafCount-1 || 1);
const y = baseY - 14 - t*(stemH-20 > 0 ? stemH-20 : 0);
const dir = i % 2 === 0 ? 1 : -1;
const size = 13 + (i%3)*3;
if(isBanana){
  /* 🍌 바나나 잎은 작은 물방울 잎이 아니라, 굵은 중심맥을 가진 길쭉하고 넓은 잎으로 그려요 */
  const len = size*3.1;
  const wid = size*1.15;
  leaves += `       <g transform="translate(100,${y}) rotate(${dir*22})">         <path d="M0,0 Q ${dir*wid},${-len*0.32} ${dir*wid*0.55},${-len} Q ${dir*-wid*0.35},${-len*0.55} 0,0 Z"
              fill="#5fae6c" stroke="#3f8a52" stroke-width="1.3"/>
        <path d="M0,-2 Q ${dir*wid*0.15},${-len*0.5} ${dir*wid*0.3},${-len*0.92}" stroke="#3f8a52" stroke-width="1" fill="none" opacity="0.55"/>       </g>`;
} else if(isGrape){
  /* 🍇 포도는 손바닥처럼 뾰족한 결각(로브)이 있는 넓적한 잎으로 그려서, 통잎인 다른 작물과 구별돼요 */
  const s = size*1.25;
  leaves += `       <g transform="translate(100,${y}) rotate(${dir*18})">
         <path d="M0,0
           C ${dir*s*0.3},${-s*0.1} ${dir*s*0.55},${-s*0.05} ${dir*s*0.75},${-s*0.55}
           C ${dir*s*0.85},${-s*0.75} ${dir*s*0.55},${-s*0.85} ${dir*s*0.35},${-s*0.65}
           C ${dir*s*0.3},${-s*1.05} ${dir*s*0.05},${-s*1.25} 0,${-s*1.35}
           C ${dir*-s*0.05},${-s*1.25} ${dir*-s*0.3},${-s*1.05} ${dir*-s*0.35},${-s*0.65}
           C ${dir*-s*0.55},${-s*0.85} ${dir*-s*0.85},${-s*0.75} ${dir*-s*0.75},${-s*0.55}
           C ${dir*-s*0.55},${-s*0.05} ${dir*-s*0.3},${-s*0.1} 0,0 Z"
           fill="#6bb06a" stroke="#3f8a52" stroke-width="1.1"/>
         <path d="M0,-2 L0,${-s*1.2}" stroke="#3f8a52" stroke-width="0.9" opacity="0.5"/>
       </g>`;
} else if(isTangerine){
  /* 🍊 귤(감귤류)은 반질반질한 타원형 홑잎이고, 잎자루에 작은 "날개"가 붙는 게 특징이라 그 부분도 표현해요 */
  const len = size*2.15, wid = size*0.9;
  leaves += `       <g transform="translate(100,${y}) rotate(${dir*15})">
         <path d="M0,2 Q ${dir*wid*0.55},1 ${dir*wid*0.35},-1.5 Q ${dir*wid*0.15},2.5 0,2 Z" fill="#4c9a5b" opacity="0.85"/>
         <path d="M0,0 Q ${dir*wid},${-len*0.32} 0,${-len} Q ${dir*-wid*0.62},${-len*0.32} 0,0 Z"
           fill="#3f8a52" stroke="#2c6b3c" stroke-width="1.1"/>
         <path d="M0,-2 L0,${-len*0.86}" stroke="#2c6b3c" stroke-width="0.8" opacity="0.55"/>
       </g>`;
} else {
  /* 🍅 토마토는 작은 잎쪽 3장이 붙은 깃꼴겹잎(잔가지+잎쪽)으로 그려서 홑잎인 포도/귤과 구별돼요 */
  const rachisLen = size*2;
  const leaflet = `<path d="M0,0 Q 7,-4 9,1.5 Q 5,5.5 0,0 Z" fill="#5fae6c" stroke="#3f8a52" stroke-width="1"/>`;
  leaves += `       <g transform="translate(100,${y}) rotate(${dir*12})">
         <path d="M0,0 L0,${-rachisLen}" stroke="#3f8a52" stroke-width="1.3" fill="none"/>
         <g transform="translate(${dir*2},${-rachisLen*0.35}) rotate(${dir*40})">${leaflet}</g>
         <g transform="translate(${dir*-2.5},${-rachisLen*0.35}) rotate(${dir*140}) scale(-1,1)">${leaflet}</g>
         <g transform="translate(0,${-rachisLen}) scale(0.9)">${leaflet}</g>
       </g>`;
}
}

/* 🍌 바나나는 나무처럼 자라니, 다른 화분들보다 화분 자체를 더 크게(약 1.2배) 그려서
   존재감을 다르게 줍니다. (밑변 중심인 100,220 기준으로 확대) */
const potScale = isBanana ? 1.22 : 1;
let pot = `     <g>       <path d="M62,220 L138,220 L130,238 Q100,244 70,238 Z" fill="${PLANT_INFO.potColor}"/>       <rect x="58" y="212" width="84" height="12" rx="4" fill="${PLANT_INFO.potColorLight}"/>       <ellipse cx="100" cy="213" rx="42" ry="7" fill="#7a5235" opacity="0.55"/>     </g>`;

let seedStage = '';
if(stage === 0){
  if(isBanana){
    seedStage = `       <ellipse cx="100" cy="215" rx="10" ry="7" fill="#8a5a2e"/><ellipse cx="100" cy="212" rx="6" ry="4" fill="#a97a45"/>
  `;
  } else if(isGrape){
    /* 🍇 포도씨는 작은 씨앗 두 알이 붙어 있는 모습으로 표현해요 */
    seedStage = `       <ellipse cx="96" cy="216" rx="4.3" ry="6" fill="#6a4c2e" transform="rotate(-14 96 216)"/>
       <ellipse cx="104" cy="214" rx="3.8" ry="5.4" fill="#7a5a38" transform="rotate(12 104 214)"/>
  `;
  } else if(isTangerine){
    /* 🍊 감귤류 씨앗은 하얗고 길쭉한 모양이라 다른 작물들과 색부터 다르게 표현해요 */
    seedStage = `       <ellipse cx="100" cy="214" rx="5.5" ry="8.5" fill="#f2ecd8" stroke="#d8cfa8" stroke-width="0.8" transform="rotate(-6 100 214)"/>
  `;
  } else {
    seedStage = `       <ellipse cx="100" cy="214" rx="7" ry="9" fill="#8a5a2e"/>
  `;
  }
}

const stemColor = isBanana ? '#4c7a3f' : isTangerine ? '#6b5a3a' : '#3f8a52';
const stemWidth = isBanana ? 9+stage*0.9 : isTangerine ? 7+stage*0.75 : 6+stage*0.6;
/* 🍇 포도는 곧게 자라지 않고 살짝 구불구불 휘감아 올라가는 덩굴 줄기 + 돌돌 말린 덩굴손으로 표현해요 */
const stemPath = isGrape
  ? `M100,${baseY} C ${112},${topY+50} ${88},${topY+25} ${106},${topY+10} C ${111},${topY+3} ${97},${topY+1} 100,${topY}`
  : `M100,${baseY} C ${96},${topY+40} ${104},${topY+20} 100,${topY}`;
const tendril = (isGrape && stage>=2)
  ? `<path d="M105,${topY+16} q 8,-1 7,-9 q -1,-7 -8,-5 q 6,1 5,7 q -1,5 -5,4" stroke="#3f8a52" stroke-width="1.6" fill="none" stroke-linecap="round"/>`
  : '';
let stem = stage > 0 ? `     <path d="${stemPath}"
          stroke="${stemColor}" stroke-width="${stemWidth}" fill="none" stroke-linecap="round"/>
      ${tendril}
  ` : '';

/* 🍅 토마토는 노란 5장짜리 꽃, 🍇 포도는 작은 연둣빛 꽃송이, 🍌 바나나는 아래로 늘어지는
   자주색 꽃봉오리(바나나 꽃)로 표현해요 */
let flower = '';
if(hasFlower){
  if(isBanana){
    flower = `     <g transform="translate(100,${topY-2})">       <path d="M0,0 C 11,10 12,30 0,44 C -12,30 -11,10 0,0 Z" fill="#7b4b6b" stroke="#5c3550" stroke-width="1.3"/>
      <path d="M0,6 C 6,12 7,24 0,34 C -7,24 -6,12 0,6 Z" fill="#976388" opacity="0.7"/>     </g>
  `;
  } else if(isGrape){
    const dots = [[-6,-2],[6,-2],[-3,5],[3,5],[0,-8],[0,3]];
    flower = `     <g transform="translate(100,${topY-6})">       ${dots.map(([dx,dy])=>`<circle cx="${dx}" cy="${dy}" r="2.6" fill="#eef7df" stroke="#c8dba0" stroke-width="0.8"/>`).join('')}     </g>
  `;
  } else if(isTangerine){
    /* 🍊 감귤류 꽃은 노란 토마토꽃과 달리 하얀 꽃잎에 노란 꽃술을 가져요 */
    flower = `     <g transform="translate(100,${topY-6})">       <circle r="3" fill="#ffe082"/>
      ${[0,72,144,216,288].map(a=>`<ellipse cx="${8*Math.cos(a*Math.PI/180)}" cy="${8*Math.sin(a*Math.PI/180)}" rx="5" ry="3.2" fill="#ffffff" stroke="#e6ece0" stroke-width="0.6" transform="rotate(${a},${8*Math.cos(a*Math.PI/180)},${8*Math.sin(a*Math.PI/180)})"/>`).join('')}     </g>
  `;
  } else {
    flower = `     <g transform="translate(100,${topY-6})">       <circle r="4" fill="#ffd54f"/>
      ${[0,72,144,216,288].map(a=>`<ellipse cx="${8*Math.cos(a*Math.PI/180)}" cy="${8*Math.sin(a*Math.PI/180)}" rx="5" ry="3.2" fill="#fff3b0" transform="rotate(${a},${8*Math.cos(a*Math.PI/180)},${8*Math.sin(a*Math.PI/180)})"/>`).join('')}     </g>
  `;
  }
}

/* 🍅 토마토는 동그란 열매, 🍇 포도는 알갱이가 뭉친 송이, 🍌 바나나는 살짝 휜 초승달 모양
   바나나가 여러 개 모여 "손(hand)"을 이루는 송이로 그려요 */
let fruits = '';
for(let i=0;i<fruitCount;i++){
const fx = 100 + (i%2===0 ? -1 : 1) * (14 + i*4);
const fy = topY + (isBanana ? 18 : 24) + i*10;
if(isBanana){
  const scaleUp = 1 + Math.min(stage-8,3)*0.22;
  const bColor = fruitRipe ? fruitColorRipe : fruitColor;
  const bEdge = fruitRipe ? fruitColorRipeDeep : '#5d7a3a';
  /* 손가락 3~4개가 모인 바나나 한 "손" */
  const fingerCount = Math.min(4, 2 + i);
  let fingers = '';
  for(let f=0; f<fingerCount; f++){
    const fdx = (f - (fingerCount-1)/2) * 9 * scaleUp;
    const rot = (f - (fingerCount-1)/2) * 10;
    fingers += `<g transform="translate(${fdx},0) rotate(${rot})">           <path d="M0,0 C ${5*scaleUp},${-4*scaleUp} ${6*scaleUp},${-16*scaleUp} 0,${-22*scaleUp} C ${-4*scaleUp},${-16*scaleUp} ${-3*scaleUp},${-4*scaleUp} 0,0 Z"
            fill="${bColor}" stroke="${bEdge}" stroke-width="1"/>
          ${fruitRipe ? `<path d="M0,${-2*scaleUp} L 0,${-19*scaleUp}" stroke="${fruitColorRipeDeep}" stroke-width="0.6" opacity="0.5"/>` : ''}         </g>`;
  }
  fruits += `      <g transform="translate(${fx},${fy})">         <path d="M0,${-2} q -2,-5 -5,-6" stroke="#4c7a3f" stroke-width="2.2" fill="none" stroke-linecap="round"/>
${fingers}       </g>`;
} else if(isGrape){
  const rBerry = 3.4 + Math.min(stage-8,3)*0.7;
  const berryOffsets = [[0,-rBerry*1.5],[-rBerry*1.3,-rBerry*0.2],[rBerry*1.3,-rBerry*0.2],[-rBerry*0.9,rBerry*1.2],[rBerry*0.9,rBerry*1.2],[0,rBerry*2.3]];
  const berries = berryOffsets.map(([bx,by])=>`       <circle cx="${bx}" cy="${by}" r="${rBerry}" fill="${fruitRipe ? fruitColorRipe : fruitColor}" stroke="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" stroke-width="1"/>
        ${fruitRipe ? `<ellipse cx="${bx-rBerry*0.3}" cy="${by-rBerry*0.3}" rx="${rBerry*0.26}" ry="${rBerry*0.14}" fill="rgba(255,255,255,0.35)"/>` : ''}`).join('');
  fruits += `      <g transform="translate(${fx},${fy})">         <path d="M0,${-rBerry*1.5} q -2,-5 -5,-5" stroke="#3f8a52" stroke-width="2" fill="none" stroke-linecap="round"/>
${berries}       </g>`;
} else if(isTangerine){
  /* 🍊 감귤류 열매는 동그란 토마토와 달리 살짝 납작하고, 꼭지 반대편에 작은 배꼽 무늬가 있어요 */
  const r = 8 + Math.min(stage-8,3)*1.6;
  fruits += `      <g transform="translate(${fx},${fy})">         <ellipse rx="${r*1.08}" ry="${r*0.9}" fill="${fruitRipe ? fruitColorRipe : fruitColor}" stroke="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" stroke-width="1.2"/>
        <circle cx="0" cy="${-r*0.72}" r="${r*0.15}" fill="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" opacity="0.55"/>
        <path d="M0,${-r*0.85} q -2,-4 -5,-4" stroke="#3f8a52" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        ${fruitRipe ?`<ellipse cx="${-r*0.3}" cy="${-r*0.25}" rx="${r*0.22}" ry="${r*0.13}" fill="rgba(255,255,255,0.3)"/>` : ''}       </g>`;
} else {
  const r = 8 + Math.min(stage-8,3)*1.6;
  fruits += `      <g transform="translate(${fx},${fy})">         <circle r="${r}" fill="${fruitRipe ? fruitColorRipe : fruitColor}" stroke="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" stroke-width="1.2"/>         <path d="M0,${-r} q -2,-5 -5,-5" stroke="#3f8a52" stroke-width="2" fill="none" stroke-linecap="round"/>
        ${fruitRipe ?`<ellipse cx="${-r*0.3}" cy="${-r*0.3}" rx="${r*0.25}" ry="${r*0.15}" fill="rgba(255,255,255,0.35)"/>` : ''}       </g>`;
}
}

let groundShadow = `     <ellipse cx="100" cy="243" rx="${isBanana ? 54 : 48}" ry="8" fill="#000000" opacity="0.16"/>`;

const potAndShadow = `<g transform="translate(100,222) scale(${potScale}) translate(-100,-222)">${groundShadow}${pot}${seedStage}</g>`;

return `     <g transform="translate(0,-70)">
      ${potAndShadow}
      ${stem}
      ${leaves}
      ${flower}
      ${fruits}     </g>
  `;
}


/* ================= 인터랙션 ================= */
function waterPlant(){
  if(plantState.isDead) return;

  if(plantState.water >= WATER_CAP){
    showInfoToast("💧 지금은 충분히 촉촉해요. 조금 마르면 다시 주세요.");
    return;
  }

  plantState.water = clamp(Math.max(plantState.water, 70) + 4, 0, WATER_CAP);

  plantState.stats.waterCount = (plantState.stats.waterCount || 0) + 1;
  plantState.stats.runWaterCount = (plantState.stats.runWaterCount || 0) + 1;
  plantState.stats.hasWateredAnyDay = true;
  plantState.stats.wateredToday = true;
  plantState.lifeWater = (plantState.lifeWater || 0) + 1; // 🎯 레벨 미션용 누적 물주기
  if(getWeatherInfo().type !== 'rainy'){
    plantState.stats.wateredOnlyOnRain = false;
  }

  showBubble("꿀꺽꿀꺽! 시원해요!");
  updateUI();
  checkDeathConditions();
  checkLevelUp();
  savePlantState();
}

document.getElementById('touch-stage').addEventListener('click', function(e){
  if(plantState.isHarvestable && !plantState.isDead){
    startHarvest();
    return;
  }
  petPlant();
});

function petPlant(){
  if(plantState.isDead) return;
  petCount++;
  registerMissionProgress('pet');
  plantState.lifePet = (plantState.lifePet || 0) + 1; // 🎯 레벨 미션용 누적 쓰다듬기
  checkLevelUp();
  const svg = document.getElementById('plant-svg');
  svg.classList.remove('sway');
  svg.classList.remove('pet-shake');
  void svg.offsetWidth;
  svg.classList.add('pet-shake');
  setTimeout(()=>{ svg.classList.remove('pet-shake'); svg.classList.add('sway'); }, 600);

  // 💚 만졌을 때 잠깐 기분 좋은 표정으로 바뀌었다가 원래 상태로 돌아와요
  // 💢 단, 너무 많이(7번 이상 연속) 만지면 화난 표정으로 바뀌어요
  const willBeTooMuch = petCount >= 7;
  if(!plantState.isHarvestable){
    tempMoodOverride = willBeTooMuch ? 'angry' : 'pleased';
    renderPlant();
    clearTimeout(petPlant._moodTimer);
    petPlant._moodTimer = setTimeout(()=>{ tempMoodOverride = null; renderPlant(); }, willBeTooMuch ? 2200 : 1800);
  }

  showBubble(willBeTooMuch ? "너무 많이 만지지 마세요! 💢" : "정원사님의 따뜻한 손길! 💚");

  clearTimeout(petResetTimer);
  if(petCount >= 7){
    petCount = 0;
  } else {
    petResetTimer = setTimeout(()=>{ petCount = 0; }, 3000);
  }
}

/* ================= 수확 ================= */
let pendingGoldenTomato = false;

function startHarvest(){
  document.getElementById('harvest-hint').classList.remove('show');
  const dayNum = getCurrentDayNum();

  pendingGoldenTomato = Math.random() < 0.01;

  const bigTomatoEl = document.querySelector('#harvest-celebrate-screen .big-tomato');
  if(pendingGoldenTomato){
    bigTomatoEl.innerText = '🌟';
    document.getElementById('harvest-celebrate-text').innerText =
      `놀라워요! "${plantName}"가 전설의 ${PLANT_INFO.goldenName}가 되었어요! 정말 희귀한 일이에요!`;
  } else {
    bigTomatoEl.innerText = PLANT_INFO.icon;
    document.getElementById('harvest-celebrate-text').innerText =
      `${nickname} 정원사님이 ${dayNum}일 동안 정성껏 돌본 "${plantName}"가 먹음직스럽게 익었어요!`;
  }

  document.getElementById('harvest-celebrate-screen').style.display = 'flex';
}

/* 🍅 애정도 점수 계산: 물주기/대화 빈도(일수 대비) - 나쁜말 페널티 */
function computeAffection(dayNum, waterCount, talkGoodCount, badWordCount){
  const ratio = (waterCount + talkGoodCount*1.4) / Math.max(1, dayNum);
  let score = clamp(ratio * 55, 0, 100);
  score -= badWordCount * 8;
  score = clamp(score, 0, 100);
  let tier, face, freshness;
  if(score >= 75){ tier='최상'; face='😍'; freshness='아주 신선하고 탱탱해요'; }
  else if(score >= 50){ tier='좋음'; face='🙂'; freshness='싱싱하고 좋은 상태예요'; }
  else if(score >= 25){ tier='보통'; face='😐'; freshness='적당히 잘 익었어요'; }
  else { tier='아쉬움'; face='😟'; freshness='조금 무관심 속에서 자랐어요'; }
  return { score, tier, face, freshness };
}

function confirmHarvest(){
  const dayNum = getCurrentDayNum();
  const d = new Date();
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

  plantState.harvestedBasket.push({
    day: dayNum,
    dateStr: dateStr,
    plantName: plantName,
    plantType: PLANT_TYPE,
    isGolden: pendingGoldenTomato,
    personalityKey: personalityKey,
    waterCount: plantState.stats.runWaterCount || 0,
    talkGoodCount: plantState.stats.runTalkGoodCount || 0,
    badWordCount: plantState.stats.runBadWordCount || 0
  });

  // 🔓 이번 수확으로 '수확 개수' 조건이 막 채워져 새로 재배 가능해진 작물이 있는지 확인
  const justUnlockedByHarvest = Object.keys(PLANT_TYPES).filter(k=>{
    const t = PLANT_TYPES[k];
    if(!t.unlockHarvest || t.unlockHarvest.type !== PLANT_TYPE) return false;
    if((plantState.gardenerLevel||1) < (t.unlockLevel||1)) return false; // 레벨은 나중에 달성될 예정
    return getHarvestCountByType(PLANT_TYPE) === t.unlockHarvest.count;
  }).map(k=>PLANT_TYPES[k]);

  // 🌟 황금 작물을 수확하면 코인 보너스를 바로 지급해요
  if(pendingGoldenTomato){
    plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + 100);
    plantState.lifeCoinsEarned = (plantState.lifeCoinsEarned || 0) + 100;
  }

  checkLevelUp(); // 🎯 수확 횟수가 늘었으니 레벨 미션 달성 여부를 확인해요

  plantState.growth = 0;
  plantState.water = 50;
  plantState.sun = 50;
  plantState.isHarvestable = false;
  plantState.startDate = Date.now();
  plantState.lastRealTick = Date.now();
  plantState.stats.wateredOnlyOnRain = true;
  plantState.stats.hasWateredAnyDay = false;
  plantState.stats.currentRunHadBadWord = false;
  plantState.stats.runHasBadWord = false;
  plantState.stats.runWaterCount = 0;
  plantState.stats.runTalkGoodCount = 0;
  plantState.stats.runBadWordCount = 0;
  plantState.reviveCount = 0;
  pendingGoldenTomato = false;

  document.getElementById('harvest-celebrate-screen').style.display = 'none';
  updateBasketBadge();
  renderPlant();
  updateUI();
  savePlantState();
  if(justUnlockedByHarvest.length){
    showInfoToast(`🔓 ${justUnlockedByHarvest.map(t=>`${t.icon} ${t.name}`).join(', ')} 재배 가능해졌어요!`);
  }
  // 🌱 수확했으니, 이름/성격/종류를 새로 골라서 다음 식물을 심어요
  openAddPlantModal(currentSlotId, true);
}

/* 🧺 바구니는 정원사 공용이라, 어떤 화분에서 수확했든 종류에 상관없이 한 곳에서 모두 볼 수 있어요 */
function basketItemPlantInfo(b){
  return (b && PLANT_TYPES[b.plantType]) ? PLANT_TYPES[b.plantType] : PLANT_TYPES.tomato;
}
function renderBasketModal(){
  const basket = plantState.harvestedBasket;
  if(!basket.length){
    return `
      <div class="modal-title">수확 바구니</div>
      <div class="basket-empty">
        <span class="basket-empty-icon">🧺</span>
        <div class="basket-empty-text">아직 수확한 작물이 없어요.<br>정성껏 키워서 첫 수확을 해보세요!</div>
      </div>
      <button class="close-modal-btn" onclick="closeModal()">닫기</button>
    `;
  }
  const fastest = basket.reduce((min,b)=> b.day < min ? b.day : min, basket[0].day);
  const goldenCount = basket.filter(b=>b.isGolden).length;
  return `
    <div class="modal-title">수확 바구니</div>
    <p class="modal-sub" style="margin-bottom:10px;">키우고 있는 모든 식물의 수확물이 모여요. 눌러서 상세정보를 확인해보세요!</p>
    <div class="basket-summary">
      <div class="basket-summary-item">
        <span class="basket-summary-num">${basket.length}</span>
        <span class="basket-summary-label">총 수확</span>
      </div>
      <div class="basket-summary-item">
        <span class="basket-summary-num">${fastest}일</span>
        <span class="basket-summary-label">최단 기록</span>
      </div>
      ${goldenCount > 0 ? `
      <div class="basket-summary-item">
        <span class="basket-summary-num">${goldenCount}</span>
        <span class="basket-summary-label">🌟 황금</span>
      </div>` : ''}
    </div>
    <div class="basket-grid">
      ${basket.slice().reverse().map((b)=>{
        const realIdx = basket.indexOf(b);
        const t = basketItemPlantInfo(b);
        return `
        <div class="basket-tomato" onclick="openTomatoDetail(${realIdx})">
          <span class="basket-tomato-icon">${b.isGolden ? '🌟' : t.icon}</span>
          <span class="basket-tomato-day">${b.day}일째</span>
        </div>`;
      }).join('')}
    </div>
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
  `;
}

function openTomatoDetail(idx){
  const b = plantState.harvestedBasket[idx];

  const overlay = document.getElementById('global-modal');
  const content = document.getElementById('modal-content-area');
  overlay.style.display = 'flex';

  const pInfo = PERSONALITY_TABLE[b.personalityKey] || PERSONALITY_TABLE.active;
  const aff = computeAffection(b.day, b.waterCount||0, b.talkGoodCount||0, b.badWordCount||0);
  const face = b.isGolden ? '🌟' : aff.face;
  const t = basketItemPlantInfo(b);

  content.innerHTML = `
    <span class="detail-face">${face}</span>
    <div class="detail-name">${escapeHtml(b.plantName)}${b.isGolden ? ` (${t.goldenName})` : ''} <span style="font-size:12px; color:var(--ink-soft); font-weight:700;">${t.icon} ${t.name}</span></div>
    <div class="detail-sub">${pInfo.emoji} ${pInfo.label} · ${b.day}일 동안 자람</div>

    <div class="detail-stat-row"><span>신선도</span><span>${aff.freshness}</span></div>
    <div class="detail-stat-row"><span>수확일</span><span>${b.dateStr}</span></div>
    <div class="detail-stat-row"><span>물 준 횟수</span><span>${b.waterCount||0}회</span></div>
    <div class="detail-stat-row"><span>다정한 대화</span><span>${b.talkGoodCount||0}회</span></div>
    ${(b.badWordCount||0) > 0 ? `<div class="detail-stat-row"><span>속상한 말</span><span>${b.badWordCount}회</span></div>` : ''}

    <div class="detail-stat-row" style="display:block;">
      <div style="display:flex; justify-content:space-between;"><span>애정도</span><span>${aff.tier} (${Math.round(aff.score)}점)</span></div>

}

async function processSpeech(){
  if(isAiReplying) return;
  const inputField = document.getElementById('talk-inline-input');
  if(!inputField) return;
  const text = inputField.value.trim();
  if(!text) return;

  // 🔒 개발자 모드 잠금 해제/잠금 문구부터 확인
  if(text === DEV_UNLOCK_PHRASE){
    safeSet(DEV_MODE_KEY, '1');
    inputField.value = '';
    closeTalkInput();
    showInfoToast('🛠️ 개발자 모드 ON (이 기기에서만 보여요)');
    return;
  }
  if(text === DEV_LOCK_PHRASE){
    safeSet(DEV_MODE_KEY, '0');
    inputField.value = '';
    closeTalkInput();
    showInfoToast('🛠️ 개발자 모드 OFF');
    return;
  }

  // 🛠️ 치트 코드 확인 — 개발자 모드가 켜져 있을 때만 동작하고, 일치하면 일반 대화 로직은 건너뜁니다.
  if(isDevMode() && DEV_CHEATS[text]){
    DEV_CHEATS[text]();
    inputField.value = '';
    closeTalkInput();
    checkDeathConditions();
    checkLevelUp();
    savePlantState();
    return;
  }

  const isGood = GOOD_WORDS.some(w=>text.includes(w));
  const isBad = BAD_WORDS.some(w=>text.includes(w));
  const p = getPersonality();

  // 성장치/카운트는 하드코딩 판정 그대로 유지
  // 🌱 대화로 인한 성장 보너스는 하루 미션 목표(5회)까지만 적용돼요.
  //    (제한 없이 계속 말을 걸어 성장 기간이 지나치게 짧아지는 것을 방지)
  ensureDailyMission();
  const talkedTodayCount = (plantState.dailyMission && plantState.dailyMission.talkCount) || 0;
  const talkGrowthAllowed = talkedTodayCount < DAILY_MISSION_TARGET;
  if(isGood){
    if(talkGrowthAllowed){
      plantState.growth = clamp(plantState.growth + 0.3 + p.talkBonus, 0, 100);
    }
    plantState.stats.talkGoodCount = (plantState.stats.talkGoodCount || 0) + 1;
    plantState.stats.runTalkGoodCount = (plantState.stats.runTalkGoodCount || 0) + 1;
    plantState.lifeTalk = (plantState.lifeTalk || 0) + 1; // 🎯 레벨 미션용 누적 다정한 대화
  } else if(isBad){
    plantState.badWordCount += 1;
    plantState.stats.totalBadWordEver = (plantState.stats.totalBadWordEver || 0) + 1;
    plantState.stats.runBadWordCount = (plantState.stats.runBadWordCount || 0) + 1;
    plantState.stats.currentRunHadBadWord = true;
    plantState.stats.runHasBadWord = true;
  } else {
    if(talkGrowthAllowed){
      plantState.growth = clamp(plantState.growth + p.talkBonus * 0.4, 0, 100);
    }
  }
  plantState.stats.talkedToday = true;
  registerMissionProgress('talk');

  inputField.value = '';
  closeTalkInput();
  showGardenerBubble(text);
  showThinkingBubble();

  isAiReplying = true;
  document.getElementById('talk-send-btn').disabled = true;

  let reply = await getAiReply(text, isGood, isBad);

  isAiReplying = false;
  document.getElementById('talk-send-btn').disabled = false;

  showBubble(reply);

  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.isHarvestable = true;
    plantState.growth = 100;
  }

  updateUI();
  checkDeathConditions();
  checkLevelUp();
  savePlantState();
}

function toggleSynthesizer(){
  soundOn = !soundOn;
  if(soundOn){
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    const bufferSize = 2*audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) output[i] = Math.random()*2-1;

    ambientSound = audioCtx.createBufferSource();
    ambientSound.buffer = noiseBuffer;
    ambientSound.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type='lowpass';
    filter.frequency.setValueAtTime(350, audioCtx.currentTime);

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.07, audioCtx.currentTime);

    ambientSound.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
    ambientSound.start();
  } else {
    if(ambientSound){ try{ ambientSound.stop(); }catch(e){} ambientSound = null; }
  }
}

/* ================= 🔔 알림 시스템 =================
   * Notification API 기반의 "로컬" 알림입니다. 기기 알림 권한 허용 + 앱을 설치(홈 화면 추가)한
     경우 브라우저/앱이 백그라운드에 있어도 뜰 수 있어요.
   * 단, 앱을 아예 완전히 종료한 상태에서까지 알림을 보내려면 서버(Push) 인프라가 별도로 필요해서,
     지금은 "앱이 백그라운드에 있는 동안 조건이 발생했을 때" 알림을 띄우는 방식으로 동작해요. */
const NOTIF_OPT_IN_KEY = 'miniGarden_notifOptIn';
const NOTIF_ICON = '../../icons/icon-180.png';

function isNotificationSupported(){
  return typeof window !== 'undefined' && 'Notification' in window;
}
function getNotifOptIn(){
  return safeGet(NOTIF_OPT_IN_KEY) === '1';
}
function setNotifOptIn(v){
  safeSet(NOTIF_OPT_IN_KEY, v ? '1' : '0');
}
async function requestNotificationPermission(){
  if(!isNotificationSupported()){
    alert('이 브라우저/기기에서는 알림 기능을 지원하지 않아요. (iOS는 홈 화면에 앱을 추가해야만 알림을 받을 수 있어요)');
    return false;
  }
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied'){
    alert('알림이 차단되어 있어요. 브라우저 또는 기기 설정에서 이 앱의 알림 권한을 허용해주세요.');
    return false;
  }
  try{
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  }catch(e){ return false; }
}
function toggleNotifOptIn(checked){
  if(checked){
    requestNotificationPermission().then(granted=>{
      setNotifOptIn(granted);
      const toggle = document.getElementById('notif-toggle');
      if(!granted){
        if(toggle) toggle.checked = false;
        showInfoToast('🔔 알림 권한이 허용되지 않았어요.');
      } else {
        showInfoToast('🔔 정원 소식을 알림으로 받을 수 있어요!');
        // 🔔 켜자마자 실제로 알림이 뜨는지 바로 확인할 수 있도록, 화면이 켜져 있어도 테스트 알림을 하나 보내줘요.
        sendLocalNotification('🔔 알림이 잘 켜졌어요!', '이제부터 성장 소식, 날씨, 무료 코인, 레벨업 소식을 알려드릴게요.', 'notif-test', true);
      }
    });
  } else {
    setNotifOptIn(false);
  }
}
// title/body/tag로 로컬 알림을 보내요. 화면을 보고 있는 중엔 인앱 토스트만으로 충분하니
// 기본적으로는 백그라운드(hidden) 상태일 때만 시스템 알림을 띄우고,
// force가 true면(예: 알림 테스트) 화면이 켜져 있어도 바로 띄워줘요.
function sendLocalNotification(title, body, tag, force){
  if(!isNotificationSupported() || Notification.permission !== 'granted' || !getNotifOptIn()) return;
  if(!force && !document.hidden) return;
  const opts = { body, icon: NOTIF_ICON, badge: NOTIF_ICON, tag, renotify:true };
  if(navigator.serviceWorker && navigator.serviceWorker.ready){
    navigator.serviceWorker.ready.then(reg=>{
      if(reg && reg.showNotification){ reg.showNotification(title, opts); }
      else { try{ new Notification(title, opts); }catch(e){} }
    }).catch(()=>{ try{ new Notification(title, opts); }catch(e){} });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}

    e.preventDefault();
    deferredInstallPrompt = e;
  });
}
function isIos(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode(){
  return (window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
async function installApp(){
  if(isInStandaloneMode()){
    alert('이미 앱으로 설치되어 실행 중이에요! 🌿');
    return;
  }
  if(deferredInstallPrompt){
    // 📱 Android/PC 크롬, 엣지 등
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if(outcome === 'accepted'){
      showBubble('정원 앱이 설치됐어요!');
    }
    return;
  }
  if(isIos()){
    alert('아이폰/아이패드에서 설치하는 방법\n\n1. 하단의 [공유] 버튼(⬆️)을 눌러주세요\n2. "홈 화면에 추가"를 선택해주세요\n3. "추가"를 누르면 설치 완료!');
    return;
  }
  alert('이 브라우저에서는 설치 버튼을 직접 지원하지 않을 수 있어요.\n브라우저 메뉴(ex.크롬)에서 "앱 설치" 또는 "홈 화면에 추가"를 찾아보세요!');
}

/* ================= 🔄 업데이트 감지 팝업 ================= */
function setupUpdateWatcher(){
  if(!('serviceWorker' in navigator)) return;
  let reloadedAfterUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(reloadedAfterUpdate) return;
    reloadedAfterUpdate = true;
    window.location.reload();
  });
  navigator.serviceWorker.register('../../sw.js').then((reg)=>{
    if(!reg) return;
    reg.addEventListener('updatefound', ()=>{
      const newWorker = reg.installing;
      if(!newWorker) return;
      newWorker.addEventListener('statechange', ()=>{
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          document.getElementById('update-toast').classList.add('show');
        }
      });
    });
    // 📲 접속하자마자 새 버전이 있는지 즉시 확인
    reg.update().catch(()=>{});
    // 주기적으로 새 버전 있는지 확인
    setInterval(()=>{ reg.update().catch(()=>{}); }, 60*1000);
  }).catch(err => console.error('SW registration failed:', err));
}
function applyUpdate(){
  document.getElementById('update-toast').classList.remove('show');
  if(navigator.serviceWorker && navigator.serviceWorker.getRegistration){
    navigator.serviceWorker.getRegistration().then(reg=>{
      if(reg && reg.waiting){
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        // controllerchange 리스너가 보통 새로고침을 처리하지만, 혹시 못 받을 경우를 위한 안전장치
        setTimeout(()=>{ window.location.reload(); }, 1500);
      } else {
        window.location.reload();
      }
    }).catch(()=>{ window.location.reload(); });
  } else {
    window.location.reload();
  }
}

/* ================= 계절별 낙하 효과 + 배경 색감 (마당/테라스일 때만 표시) ================= */
function createSeasonalFalling(){
  const container = document.getElementById('leaf-container');
  const tint = document.getElementById('season-tint');
  if(!container) return;
  container.innerHTML = '';
  if(tint) tint.classList.remove('season-active','season-spring','season-summer','season-autumn','season-winter');
  if(!OUTDOOR_LOCATIONS.includes(plantState.location)) return; // 실내(거실/방)에서는 표시하지 않아요
  const season = getCurrentSeason();
  if(tint) tint.classList.add('season-active', `season-${season}`);
  const emoji = SEASON_FALL_EMOJI[season];
  const count = isMobile ? 8 : 12;
  for(let i=0;i<count;i++){
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.innerText = emoji;
    leaf.style.left = Math.random()*100+'%';
    leaf.style.animationDelay = Math.random()*6+'s';
    leaf.style.animationDuration = (Math.random()*4+7)+'s';
    container.appendChild(leaf);
  }
}

      그 순간의 시각으로 정확히 저장해둬요. 그래야 다음에 다시 열었을 때

});

});
