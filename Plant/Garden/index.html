<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="../../manifest.webmanifest">
<meta name="theme-color" content="#81c784">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pocket Planter">
<link rel="apple-touch-icon" href="../../icons/icon-180.png">
<style>
@font-face {
  font-family: 'OngleipParkDahyeon';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
</style>
<title>Pocket Planter</title>
<style>
  :root{
    --sky-light:#dcf0f7;
    --sky:#9fd3e8;
    --sky-deep:#6fb6d4;
    --leaf-deep:#3f8a52;
    --leaf:#5fae6c;
    --leaf-light:#9fd89a;
    --mint:#cdeec0;
    --tomato:#e4583c;
    --tomato-deep:#c2432a;
    --ink:#33402f;
    --ink-soft:#76876f;
    --card:#ffffff;
    --card-soft:#f3faee;
    --rain:#5c7d8c;
    --cloud:#aebcb6;
    --shadow-soft: 0 8px 22px rgba(70,110,70,0.12);
  }
  html,body{
    width:100%;height:100%;height:100dvh;margin:0;padding:0;overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--sky-light);
    display:flex;justify-content:center;align-items:center;
  }
  *{box-sizing:border-box;}

  .game-container{
    width:100%;height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
    z-index:2;
    background: linear-gradient(180deg, var(--sky-light) 0%, var(--mint) 100%);
  }

  .scene-bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center bottom;
    transition: filter 1.2s ease, background-image 0.6s ease;
    z-index:0;
  }
  .scene-bg.is-rainy{ filter: brightness(0.55) saturate(0.85); }
  .scene-bg.is-cloudy{ filter: brightness(0.85) saturate(0.9); }
  .scene-dim{
    position:absolute; inset:0; z-index:1;
    background: rgba(20,30,35,0); transition: background 1s ease;
    pointer-events:none;
  }
  .scene-dim.is-rainy{ background: rgba(15,25,35,0.28); }

  .rain-layer{
    position:absolute; inset:0; z-index:3; pointer-events:none; overflow:hidden; display:none;
  }
  .rain-layer.active{ display:block; }
  .raindrop{
    position:absolute; top:-10%;
    width:2px; height:60px;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.55));
    animation: rain-fall linear infinite;
  }
  @keyframes rain-fall{
    0%{ transform: translateY(0); }
    100%{ transform: translateY(120vh); }
  }
  .lightning-flash{
    position:absolute; inset:0; background:#fff; opacity:0;
    z-index:4; pointer-events:none;
  }
  .lightning-flash.flash{ animation: flash-anim 0.45s ease; }
  @keyframes flash-anim{
    0%{opacity:0;} 8%{opacity:0.85;} 16%{opacity:0.1;} 24%{opacity:0.6;} 100%{opacity:0;}
  }

  .leaf{
    position:absolute; top:-20px; pointer-events:none; z-index:3;
    font-size:16px; color: rgba(255,255,255,0.55);
    animation: leaf-fall linear infinite;
  }
  @keyframes leaf-fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.8; }
    100%{ transform:translateY(105vh) rotate(360deg); opacity:0; }
  }

  .status-bar{
    position:relative; z-index:6;
    display:flex; justify-content:space-between; align-items:center;
    padding: calc(14px + env(safe-area-inset-top, 0px)) 18px 0;
    font-size:11.5px; color:#3a5a48; font-weight:700;
  }
  .weather-chip{
    display:flex; align-items:center; gap:4px;
    background:rgba(255,255,255,0.8); border-radius:999px; padding:5px 11px;
    backdrop-filter: blur(6px); box-shadow:0 2px 8px rgba(70,110,70,0.08);
  }
  .status-bar-right{ display:flex; align-items:center; gap:8px; }
  .coin-chip{
    display:flex; align-items:center; gap:5px;
    background:rgba(255,248,220,0.92); border-radius:999px; padding:5px 11px;
    color:#8a5a00; box-shadow:0 2px 8px rgba(160,120,20,0.14);
    font-weight:800;
  }
  .coin-icon{
    width:1em; height:1em; display:inline-block;
    vertical-align:-0.15em; flex-shrink:0;
  }

  .floating-coin-layer{
    position:absolute; inset:0; z-index:9; pointer-events:none; overflow:hidden;
  }
  .floating-coin{
    position:absolute; width:44px; height:44px; border:none; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff7b1 0%, #ffd54f 45%, #f5b300 100%);
    color:#8a5a00; font-size:20px; font-weight:900; cursor:pointer;
    box-shadow:0 10px 18px rgba(185,140,0,0.28);
    animation: coin-pop 0.35s ease, coin-float 2.1s ease-in-out infinite;
    pointer-events:auto;
  }
  .floating-coin::after{
    content:'+10'; position:absolute; right:-6px; top:-6px;
    background:#fff; color:#d97706; border-radius:999px;
    padding:2px 6px; font-size:10px; font-weight:900;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
  }
  @keyframes coin-pop{
    0%{ transform:scale(0.35); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  @keyframes coin-float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }

  .utility-actions{
    position:absolute; top:38px; right:6px; left:auto; z-index:7; display:flex; flex-direction:column; gap:8px;
  }
  .utility-icon-btn{
    width:36px; height:36px; border:none; border-radius:50%;
    background:rgba(255,255,255,0.92); color:var(--leaf-deep);
    box-shadow:0 8px 18px rgba(70,110,70,0.16);
    font-size:18px; display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .utility-icon-btn:active{ transform:scale(0.94); }
  .utility-icon-btn.hidden{ display:none; }
  .utility-icon-btn.shake{ animation: clover-shake 0.55s ease; }
  @keyframes clover-shake{
    0%,100%{ transform:rotate(0deg) scale(1); }
    20%{ transform:rotate(-14deg) scale(1.05); }
    40%{ transform:rotate(12deg) scale(1.08); }
    60%{ transform:rotate(-10deg) scale(1.05); }
    80%{ transform:rotate(8deg) scale(1.03); }
  }

  .coin-balance-card{
    background:#fff8e8; color:#8a5a00; border-radius:16px; padding:11px 14px;
    margin-bottom:12px; text-align:center; font-size:13px; font-weight:800;
    border:1.5px solid #ffe3a0;
  }
  .shop-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:10px; }
  .shop-card{
    background:var(--card-soft); border:1.5px solid #e1f0d8; border-radius:16px;
    padding:12px 10px; text-align:center;
  }
  .shop-card-title{ display:block; font-size:12.5px; color:#39523b; font-weight:800; margin-bottom:4px; }
  .shop-card-desc{ display:block; font-size:10.5px; color:var(--ink-soft); line-height:1.45; min-height:30px; margin-bottom:7px; }
  .shop-card-price{ display:block; font-size:11px; color:#d97706; font-weight:900; margin-bottom:8px; }
  .shop-buy-btn{
    border:none; border-radius:999px; padding:7px 10px; width:100%;
    background:var(--leaf); color:#fff; font-size:11px; font-weight:800; cursor:pointer;
  }
  .shop-buy-btn.expensive{ background:#e58a3c; }
  .shop-buy-btn:disabled{ background:#c8d6c5; color:#6f7a6d; cursor:not-allowed; }

  .dashboard{
    position:relative; z-index:6;
    background: rgba(255,255,255,0.94);
    border-radius:20px; margin:10px 14px 0; padding:14px 14px 12px;
    box-shadow: var(--shadow-soft);
    border:1px solid rgba(60,100,60,0.05);
  }
  .info-header{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px; font-size:13.5px; font-weight:800; color:var(--leaf-deep);
  }
  .info-header > div:first-child{ display:flex; align-items:center; gap:5px; }
  .plant-name-pill{
    background:#fff0ea; color:var(--tomato-deep);
    padding:4px 10px; border-radius:999px; font-size:11.5px;
  }
  .status-row{
    display:flex; align-items:center; font-size:12px; margin:6px 0; color:var(--ink-soft); gap:8px;
  }
  .status-row > span:first-child{ flex-shrink:0; white-space:nowrap; width:88px; }
  .progress-bar-bg{
    flex:1; height:8px; background:#eef3ea; border-radius:999px; overflow:hidden;
  }
  .progress-bar-fill{
    height:100%; border-radius:999px; width:0%;
    background: linear-gradient(90deg, var(--leaf), var(--leaf-deep));
    transition: width 0.5s ease;
  }
  .water-fill{ background: linear-gradient(90deg, #8fd3ec, #4fa9d6); }
  .sun-fill{ background: linear-gradient(90deg, #ffe49a, #ffc14d); }
  .speed-fill{ background: linear-gradient(90deg, #ffcf7a, #ff9a3c); transition: width 0.4s linear; }

  .daily-mission-row{ display:flex; gap:7px; margin-top:9px; }
  .mission-chip{
    flex:1; text-align:center; background:var(--card-soft); border:1.5px solid #e1f0d8;
    border-radius:999px; padding:5px 6px; font-size:10.5px; font-weight:700; color:#4a5d44;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition: background 0.2s, border-color 0.2s;
  }
  .mission-chip b{ font-weight:900; color:var(--leaf-deep); }
  .mission-chip.completed{ background:#fff8e0; border-color:#ffdd88; color:#8a5a00; }
  .mission-chip.completed b{ color:#d97706; }
  .mission-chip.completed::before{ content:'✅ '; }

  .garden-stage{
    flex:1; min-height:0; position:relative; z-index:5;
    display:flex; align-items:flex-end; justify-content:center;
    margin:6px 0 4px;
  }
  .speech-bubble-wrap{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom: 58%;
    z-index:8; display:none; max-width:88%;
  }
  .speech-bubble-wrap.show{ display:block; animation: bubble-pop 0.25s ease; }
  @keyframes bubble-pop{
    0%{ transform: translateX(-50%) scale(0.85); opacity:0; }
    100%{ transform: translateX(-50%) scale(1); opacity:1; }
  }
  .speech-bubble{
    background:#fff; border-radius: 22px;
    padding:10px 18px; font-size:15.5px; font-weight:400; color:#3a4636;
    font-family:'OngleipParkDahyeon','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    text-align:center; position:relative;
    border: 2px solid #eef6e8;
  }
  .speech-bubble::after{
    content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
    width:16px; height:16px; background:#fff;
    border-right:2px solid #eef6e8; border-bottom:2px solid #eef6e8;
    border-radius: 0 0 4px 0;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }
  .thinking-dots{ display:inline-flex; gap:3px; align-items:center; vertical-align:middle; }
  .thinking-dots span{
    width:6px; height:6px; border-radius:50%; background:#9fb89a;
    animation: dot-bounce 1.1s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2){ animation-delay:0.15s; }
  .thinking-dots span:nth-child(3){ animation-delay:0.3s; }
  @keyframes dot-bounce{
    0%, 80%, 100%{ transform: translateY(0); opacity:0.5; }
    40%{ transform: translateY(-4px); opacity:1; }
  }

  /* 🧑‍🌾 정원사(나)가 한 말이 뜨는 말풍선 — 입력창이 있던 자리(하단)에서 뜨고 사라집니다 */
  .gardener-bubble-wrap{
    position:relative; z-index:6;
    margin: 0 14px 0;
    max-height:0; opacity:0; overflow:hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
  }
  .gardener-bubble-wrap.show{
    max-height:70px; opacity:1; margin:0 14px 9px;
  }
  .gardener-bubble{
    background:#eaf6ff; border:1.5px solid #cdeaff; border-radius:16px;
    padding:10px 14px; font-size:13px; font-weight:700; color:#2d5e74;
    display:flex; align-items:center; gap:8px;
  }
  .gardener-bubble .who{ flex-shrink:0; font-size:15px; }

  .plant-stage-svg{
    width: 78%;
    max-width: 230px;
    height: auto;
    transform-origin: bottom center;
  }
  .plant-stage-svg.sway{
    animation: gentle-sway 4s ease-in-out infinite;
  }
  @keyframes gentle-sway{
    0%,100%{ transform: rotate(-1.3deg); }
    50%{ transform: rotate(1.3deg); }
  }
  .plant-stage-svg.pet-shake{
    animation: pet-shake 0.6s ease;
  }
  @keyframes pet-shake{
    0%{ transform: rotate(0deg); }
    20%{ transform: rotate(-7deg); }
    40%{ transform: rotate(6deg); }
    60%{ transform: rotate(-4deg); }
    80%{ transform: rotate(2deg); }
    100%{ transform: rotate(0deg); }
  }
  .plant-stage-svg.harvest-pulse{
    animation: harvest-pulse-anim 0.9s ease-in-out infinite;
    cursor:pointer;
  }
  @keyframes harvest-pulse-anim{
    0%,100%{ filter: drop-shadow(0 0 0 rgba(228,88,60,0)); transform: scale(1) rotate(-1deg); }
    50%{ filter: drop-shadow(0 0 14px rgba(228,88,60,0.55)); transform: scale(1.035) rotate(1deg); }
  }

  .location-tag{
    position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    background: rgba(40,60,45,0.55); color:#fff; padding:4px 12px;
    border-radius:999px; font-size:10.5px; font-weight:700; z-index:7;
    white-space:nowrap;
  }

  .personality-badge{
    position:absolute; top:6px; right:6px;
    background:rgba(255,255,255,0.85); padding:4px 9px;
    border-radius:999px; font-size:10.5px; font-weight:700; z-index:7;
    color:#43543e; white-space:nowrap;
  }

  .speed-badge{
    position:absolute; top:6px; left:6px;
    background:rgba(255,193,77,0.92); padding:4px 9px;
    border-radius:999px; font-size:10.5px; font-weight:800; z-index:7;
    color:#7a4d00; white-space:nowrap; display:none;
  }
  .speed-badge.show{ display:block; }

  .pot-face-eye{ fill:#3a3530; }
  .pot-face-mouth{ stroke:#3a3530; stroke-width:2.4; fill:none; stroke-linecap:round; }
  .pot-face-blush{ fill:#f4a89a; opacity:0.55; }
  .pot-face-sweat{ fill:#8fd3ec; }

  .achievement-toast{
    position:absolute; top:54px; left:50%; transform:translateX(-50%) translateY(-12px);
    background:#3a4636; color:#fff; padding:10px 16px; border-radius:14px;
    font-size:12px; font-weight:700; z-index:50; white-space:nowrap;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
    opacity:0; pointer-events:none; transition: opacity 0.25s ease, transform 0.25s ease;
    display:flex; align-items:center; gap:7px;
  }
  .achievement-toast.show{
    opacity:1; transform:translateX(-50%) translateY(0);
  }
  .achievement-toast-icon{ font-size:17px; }

  .achv-grid{ display:flex; flex-direction:column; gap:8px; max-height:280px; overflow-y:auto; margin-bottom:8px; }
  .achv-row{
    display:flex; align-items:center; gap:10px;
    background:var(--card-soft); border-radius:13px; padding:10px 12px;
    border:1.5px solid #e1f0d8;
  }
  .achv-row.locked{ opacity:0.45; }
  .achv-row-icon{ font-size:22px; flex-shrink:0; width:28px; text-align:center; }
  .achv-row-text{ flex:1; text-align:left; }
  .achv-row-title{ font-size:12.5px; font-weight:700; color:#3a4a35; display:block; }
  .achv-row-desc{ font-size:10.5px; color:var(--ink-soft); display:block; margin-top:1px; }
  .achv-summary-bar{
    background:var(--card-soft); border-radius:13px; padding:10px 14px; margin-bottom:12px;
    font-size:12px; font-weight:700; color:var(--leaf-deep); text-align:center;
  }

  .diary-entry{
    background:var(--card-soft); border-radius:13px; padding:11px 14px; margin-bottom:8px;
    border:1.5px solid #e1f0d8; text-align:left;
  }
  .diary-entry-date{ font-size:10px; color:var(--ink-soft); font-weight:700; margin-bottom:4px; display:block; }
  .diary-entry-text{ font-size:12.5px; color:#3a4a35; line-height:1.5; }
  .diary-list{ max-height:280px; overflow-y:auto; margin-bottom:8px; }
  .diary-empty{ text-align:center; padding:24px 10px; color:var(--ink-soft); }
  .diary-empty-icon{ font-size:34px; display:block; margin-bottom:8px; opacity:0.6; }
  .diary-empty-text{ font-size:12px; line-height:1.6; }

  .harvest-hint{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background: var(--tomato); color:#fff; padding:5px 13px;
    border-radius:999px; font-size:11px; font-weight:800; z-index:7;
    white-space:nowrap; box-shadow:0 6px 14px rgba(228,88,60,0.35);
    display:none; animation: hint-bounce 1.4s ease-in-out infinite;
  }
  .harvest-hint.show{ display:block; }
  @keyframes hint-bounce{
    0%,100%{ transform: translateX(-50%) translateY(0); }
    50%{ transform: translateX(-50%) translateY(-4px); }
  }

  .talk-inline-bar{
    position:relative; z-index:6;
    display:flex; flex-direction:column; gap:5px;
    margin:0 14px 9px;
    max-height:0; opacity:0; overflow:hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
  }
  .talk-inline-bar.show{
    max-height:96px; opacity:1;
  }
  .talk-badword-mini{
    font-size:10px; font-weight:800; color:#e4583c; text-align:center;
  }
  .talk-input-row{ display:flex; align-items:center; gap:7px; }
  .talk-inline-input{
    flex:1; min-width:0; padding:11px 14px; border:1.5px solid #e1f0d8; border-radius:999px;
    outline:none; font-size:16px; background:#fff; box-shadow: var(--shadow-soft);
  }
  .talk-inline-input:focus{ border-color: var(--leaf); }
  .talk-inline-send, .talk-inline-close{
    width:38px; height:38px; border-radius:50%; border:none; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:15px; transition: transform 0.1s;
  }
  .talk-inline-send{ background:var(--leaf); color:#fff; }
  .talk-inline-send:disabled{ opacity:0.5; }
  .talk-inline-close{ background:#fff; color:#8a978a; box-shadow: var(--shadow-soft); }
  .talk-inline-send:active, .talk-inline-close:active{ transform: scale(0.9); }

  .control-menu{
    position:relative; z-index:6;
    display:grid; grid-template-columns:repeat(3,1fr); gap:7px;
    padding: 0 14px 7px;
  }
  .control-menu.row2{
    grid-template-columns:repeat(5,1fr);
    padding: 0 14px calc(16px + env(safe-area-inset-bottom, 0px));
  }
  .menu-btn{
    background:#fff; border:none; border-radius:16px; padding:9px 0 8px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    font-size:9.5px; font-weight:700; color:#4a5a44;
    box-shadow: var(--shadow-soft);
    cursor:pointer; transition: transform 0.12s, background 0.12s;
    position:relative; letter-spacing:-0.1px;
  }
  .menu-btn:active{ transform: scale(0.94); background:#f5faf1; }
  .menu-btn-icon{ font-size:17px; }
  .menu-btn-icon-wrap{
    width:32px; height:32px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
  }
  .menu-btn-icon-wrap svg{ width:17px; height:17px; }
  .icon-water{ background:#e7f5fc; color:#2f9fd8; }
  .icon-move{ background:#fbf0e2; color:#c67a2e; }
  .icon-talk{ background:#eaf7ea; color:#4f9a5a; }
  .icon-speed{ background:#fff0dd; color:#e0862e; }
  .icon-diary{ background:#eef0fb; color:#6070c8; }
  .icon-basket{ background:#fdebe6; color:var(--tomato-deep); }
  .icon-trophy{ background:#fdf6df; color:#c99a1c; }
  .icon-settings{ background:#edf1ee; color:#57665e; }
  .menu-btn-badge{
    position:absolute; top:4px; right:6px;
    background:var(--tomato); color:#fff; font-size:9px; font-weight:800;
    min-width:15px; height:15px; padding:0 3px; border-radius:999px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 4px rgba(228,88,60,0.4);
  }

  .modal-overlay{
    position:absolute; inset:0; z-index:100;
    background: rgba(25,38,30,0.4);
    backdrop-filter: blur(3px);
    display:none; justify-content:center; align-items:center;
    border-radius: inherit;
  }
  .modal-content{
    background:#fff; border-radius:22px; padding:22px 20px;
    width:84%; max-width:280px; box-sizing:border-box;
    box-shadow: 0 16px 34px rgba(0,0,0,0.2);
    animation: modal-pop 0.18s ease-out;
    max-height: 80%;
    overflow-y:auto;
  }
  @keyframes modal-pop{

  .switch input:checked + .switch-track{ background: var(--leaf); }

  .harvest-confirm-btn{

  /* 🚫 화면 텍스트 복사 방지 (입력창은 예외) */
  .game-container, .game-container *{

    -webkit-user-select:text; -moz-user-select:text; -ms-user-select:text; user-select:text;
  }

  .info-toast{
    position:absolute; top:96px; left:50%; transform:translateX(-50%) translateY(-12px);
    background:#4c7fae; color:#fff; padding:9px 15px; border-radius:14px;
    font-size:11.5px; font-weight:700; z-index:55; white-space:nowrap;

  .plant-tab-bar{

  }

  .plant-tab:active{ transform: scale(0.96); }

  .diary-entry{ cursor:pointer; transition: background 0.12s; }

  @media (min-width:1024px){

  }
  @media (max-height:680px){
    .speech-bubble-wrap{ bottom:54%; }
    .plant-stage-svg{ max-width:190px; }
  }
</style>

  <!-- 모달 -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal-content" id="modal-content-area"></div>
  </div>
</div>

<script>
/* ================= 안전한 localStorage 접근 ================= */
function safeGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function safeSet(key,val){ try{ localStorage.setItem(key,val); }catch(e){} }
function safeRemove(key){ try{ localStorage.removeItem(key); }catch(e){} }

/* 🚫 화면 텍스트 복사/드래그 선택/우클릭 방지 (입력창은 예외) */
['copy','cut','contextmenu','selectstart'].forEach(function(evt){
  document.addEventListener(evt, function(e){
    const tag = e.target && e.target.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    e.preventDefault();
  });
});

/* ================= 기본 정보 로드 ================= */
const urlParams = new URLSearchParams(window.location.search);
const nickname = urlParams.get('nickname') || safeGet('miniGarden_nickname') || '정원사';
const profile  = urlParams.get('profile')  || safeGet('miniGarden_profile')  || '👨‍🌾';

/* 🌱🌱 식물은 최대 2개까지 함께 키울 수 있어요 (슬롯 시스템) */
const MAX_PLANT_SLOTS = 2;
const SLOTS_KEY = `miniGarden_slots_${nickname}`;
const CURRENT_SLOT_KEY = `miniGarden_currentSlot_${nickname}`;

/* 🍅🍇 식물 종류(품종)별 설정 — 슬롯마다 'tomato' 또는 'grape' 중 하나를 가질 수 있어요.
   같은 코드로 두 작물을 함께 키울 수 있도록 텍스트/색상/12단계 라벨/열매 모양을 이 표에서 갈라줍니다. */
const PLANT_TYPES = {
  tomato: {
    key:'tomato', name:'토마토', icon:'🍅', goldenName:'황금 토마토',
    themeColor:'#e4583c', themeColorDeep:'#c2432a',
    potColor:'#d97a4d', potColorLight:'#e08a5c',
    stageLabels: ['씨앗','발아 중','첫 새싹','줄기 뻗음','잎 늘어남','튼튼한 줄기','꽃대 올라옴','꽃 만개','열매 맺힘','열매 커짐','색 변하는 중','수확 가능'],
    fruitColorUnripe:'#7fae5a', fruitColorMid:'#d98a3d', fruitColorRipe:'#e4583c', fruitColorRipeDeep:'#c2432a'
  },
  grape: {
    key:'grape', name:'포도', icon:'🍇', goldenName:'황금 포도',
    themeColor:'#7b4fa0', themeColorDeep:'#5c3a7a',
    potColor:'#8a6a4d', potColorLight:'#9c7c5c',
    stageLabels: ['씨앗','발아 중','첫 새싹','줄기 뻗음','덩굴 자람','튼튼한 줄기','꽃송이 맺힘','꽃 만개','포도알 맺힘','포도송이 커짐','색 변하는 중','수확 가능'],
    fruitColorUnripe:'#8bc76a', fruitColorMid:'#9b7fc4', fruitColorRipe:'#6a4c93', fruitColorRipeDeep:'#4a3268'
  }
};

function loadSlots(){
  let slots = [];
  try{ slots = JSON.parse(safeGet(SLOTS_KEY) || '[]'); }catch(e){ slots = []; }
  if(!Array.isArray(slots)) slots = [];
  if(slots.length === 0){
    // 🔄 슬롯 시스템 이전 버전 사용자를 위한 마이그레이션: 기존 저장값을 1번 슬롯으로 옮겨줘요
    // 🍅🍇 어떤 작물을 고른 건지는 URL의 plantType으로 판단해요. (없으면 토마토로 기본 처리)
    const urlPlantType = urlParams.get('plantType');
    const legacyType = (urlPlantType && PLANT_TYPES[urlPlantType]) ? urlPlantType : 'tomato';
    const legacyPlantName = urlParams.get('plantName') || safeGet(`miniGarden_plantName_${legacyType}_${nickname}`) || '방울이';
    const legacyPersonality = urlParams.get('personality') || safeGet(`miniGarden_personality_${legacyType}_${nickname}`) || 'active';
    slots = [{ id:1, plantType:legacyType, plantName: legacyPlantName, personalityKey: legacyPersonality }];
    const legacySave = safeGet(`miniGarden_save_${legacyType}_${nickname}`);
    if(legacySave && !safeGet(`miniGarden_save_${legacyType}_${nickname}_1`)){
      safeSet(`miniGarden_save_${legacyType}_${nickname}_1`, legacySave);
    }
    safeSet(SLOTS_KEY, JSON.stringify(slots));
  }
  return slots;
}
let plantSlots = loadSlots();

function getCurrentSlotId(){
  let id = parseInt(urlParams.get('slot') || safeGet(CURRENT_SLOT_KEY) || '1', 10);
  if(!plantSlots.find(s=>s.id===id)) id = plantSlots[0] ? plantSlots[0].id : 1;
  return id;
}
let currentSlotId = getCurrentSlotId();
safeSet(CURRENT_SLOT_KEY, String(currentSlotId));

function getCurrentSlot(){
  return plantSlots.find(s=>s.id===currentSlotId) || plantSlots[0];
}
const currentSlotData = getCurrentSlot();

/* 🍅🍇 현재 슬롯의 식물 종류 (기본값은 하위호환을 위해 'tomato') */
const PLANT_TYPE = (currentSlotData && PLANT_TYPES[currentSlotData.plantType]) ? currentSlotData.plantType : 'tomato';
const PLANT_INFO = PLANT_TYPES[PLANT_TYPE];

const PLANTNAME_KEY = `miniGarden_plantName_${PLANT_TYPE}_${nickname}_${currentSlotId}`;
const PERSONALITY_KEY_STORAGE = `miniGarden_personality_${PLANT_TYPE}_${nickname}_${currentSlotId}`;
const SAVE_KEY = `miniGarden_save_${PLANT_TYPE}_${nickname}_${currentSlotId}`;

const plantName = currentSlotData.plantName;
const personalityKey = currentSlotData.personalityKey;

// 닉네임/프로필/현재 키우는 식물 기록 (재접속 시 바로 이어가기 위함)
safeSet('miniGarden_nickname', nickname);
safeSet('miniGarden_profile', profile);
safeSet(PLANTNAME_KEY, plantName);
safeSet(PERSONALITY_KEY_STORAGE, personalityKey);
safeSet(`miniGarden_currentPlantDir_${nickname}`, PLANT_TYPE === 'grape' ? 'Grape' : 'Tomato');

/* 🎨 식물 종류에 맞춰 테마 색상(CSS 변수)을 실시간으로 바꿔줍니다.
   버튼/뱃지/바구니 등 기존 --tomato 변수를 쓰는 모든 UI가 자동으로 포도색(보라)으로 바뀌어요. */
function applyPlantTheme(){
  document.documentElement.style.setProperty('--tomato', PLANT_INFO.themeColor);
  document.documentElement.style.setProperty('--tomato-deep', PLANT_INFO.themeColorDeep);
}

/* ================= 🌱🌱 식물 탭 UI (슬롯 전환/추가) ================= */
function renderPlantTabs(){
  const bar = document.getElementById('plant-tab-bar');
  if(!bar) return;
  let html = '';
  for(let i=0;i<MAX_PLANT_SLOTS;i++){
    const slotId = i+1;
    const slot = plantSlots.find(s=>s.id===slotId);
    if(slot){
      const isActive = slotId === currentSlotId;
      const icon = (PLANT_TYPES[slot.plantType] && PLANT_TYPES[slot.plantType].icon) || '🌱';
      html += `<div class="plant-tab ${isActive?'active':''}" onclick="switchSlot(${slotId})">
        <span class="plant-tab-icon">${icon}</span>${escapeHtml(slot.plantName)}
      </div>`;
    } else {
      html += `<div class="plant-tab empty" onclick="openAddPlantModal(${slotId})">
        <span class="plant-tab-icon">➕</span>새 식물 키우기
      </div>`;
    }
  }
  bar.innerHTML = html;
}

function switchSlot(slotId){
  if(slotId === currentSlotId) return;
  savePlantState();
  safeSet(CURRENT_SLOT_KEY, String(slotId));
  window.location.reload();
}

function openAddPlantModal(slotId){
  closeTalkInput();
  const overlay = document.getElementById('global-modal');
  const content = document.getElementById('modal-content-area');
  overlay.style.display = 'flex';
  const personalities = Object.keys(PERSONALITY_TABLE);
  const plantTypeKeys = Object.keys(PLANT_TYPES);
  content.innerHTML = `
    <div class="modal-title">🌱 새 식물 심기</div>
    <p class="modal-sub">어떤 작물을 키워볼까요?</p>
    <div class="modal-options-grid" id="new-plant-type-grid">
      ${plantTypeKeys.map(k=>{
        const t = PLANT_TYPES[k];
        return `<div class="modal-opt-btn" id="new-plant-type-${k}" onclick="selectNewPlantType('${k}')">${t.icon} ${t.name}</div>`;
      }).join('')}
    </div>
    <input type="text" id="new-plant-name-input" class="talk-inline-input" style="width:100%; margin-bottom:10px;" maxlength="8" placeholder="식물 이름을 지어주세요">
    <p class="modal-sub" style="margin-bottom:6px;">성격을 골라주세요.</p>
    <div class="modal-options-grid">
      ${personalities.map(k=>{
        const p = PERSONALITY_TABLE[k];
        return `<div class="modal-opt-btn" id="new-personality-${k}" onclick="selectNewPersonality('${k}')">${p.emoji} ${p.label}</div>`;
      }).join('')}
    </div>
    <button class="action-btn" style="background:var(--leaf);" onclick="createNewPlant(${slotId})">이 키우기 시작!</button>
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
  `;
  window._newPlantPersonality = 'active';
  window._newPlantType = 'tomato';
  selectNewPersonality('active');
  selectNewPlantType('tomato');
}
function selectNewPlantType(key){
  window._newPlantType = key;
  Object.keys(PLANT_TYPES).forEach(k=>{
    const el = document.getElementById(`new-plant-type-${k}`);
    if(el) el.classList.toggle('active', k===key);
  });
}
function selectNewPersonality(key){
  window._newPlantPersonality = key;
  Object.keys(PERSONALITY_TABLE).forEach(k=>{
    const el = document.getElementById(`new-personality-${k}`);
    if(el) el.classList.toggle('active', k===key);
  });
}
function createNewPlant(slotId){
  const nameInput = document.getElementById('new-plant-name-input');
  const name = (nameInput && nameInput.value.trim()) || '새싹이';
  const pKey = window._newPlantPersonality || 'active';
  const tKey = PLANT_TYPES[window._newPlantType] ? window._newPlantType : 'tomato';
  plantSlots = plantSlots.filter(s=>s.id!==slotId);
  plantSlots.push({ id:slotId, plantType:tKey, plantName:name, personalityKey:pKey });
  safeSet(SLOTS_KEY, JSON.stringify(plantSlots));
  safeSet(CURRENT_SLOT_KEY, String(slotId));
  window.location.reload();
}

/* 🔘 버튼 클릭 효과음 (작고 귀여운 "똑" 소리) */
function playClickSound(){
  try{
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.13);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.14);
  }catch(e){ /* 사운드 실패는 무시 */ }
}

/* ================= 저장/로드 ================= */
function loadPlantState(){
  const saved = safeGet(SAVE_KEY);
  if(saved){
    try{
      const parsed = JSON.parse(saved);
      plantState = Object.assign(plantState, parsed);
      if(!Array.isArray(plantState.harvestedBasket)) plantState.harvestedBasket = [];
      if(!Array.isArray(plantState.diary)) plantState.diary = [];
      if(!plantState.achievements || typeof plantState.achievements !== 'object') plantState.achievements = {};
      if(!plantState.stats || typeof plantState.stats !== 'object'){
        plantState.stats = { waterCount:0, talkGoodCount:0, totalBadWordEver:0, wateredOnlyOnRain:true, hasWateredAnyDay:false, currentRunHadBadWord:false, runHasBadWord:false, runWaterCount:0, runTalkGoodCount:0, runBadWordCount:0 };
      }
      if(typeof plantState.stats.runHasBadWord !== 'boolean') plantState.stats.runHasBadWord = false;
      if(typeof plantState.stats.runWaterCount !== 'number') plantState.stats.runWaterCount = 0;
      if(typeof plantState.stats.runTalkGoodCount !== 'number') plantState.stats.runTalkGoodCount = 0;
      if(typeof plantState.stats.runBadWordCount !== 'number') plantState.stats.runBadWordCount = 0;
      if(typeof plantState.speedMultiplier !== 'number') plantState.speedMultiplier = 1;
      if(plantState.speedMultiplier > 1) plantState.speedMultiplier = FIXED_SPEED_MULTIPLIER;
      if(typeof plantState.speedBudgetMs !== 'number') plantState.speedBudgetMs = SPEED_BUDGET_TOTAL_MS;
      if(typeof plantState.speedExhaustedAt !== 'number') plantState.speedExhaustedAt = null;
      if(typeof plantState.speedCheckpoint !== 'number') plantState.speedCheckpoint = (plantState.speedMultiplier > 1) ? Date.now() : null;
      if(typeof plantState.coins !== 'number') plantState.coins = 0;
      if(typeof plantState.lastFreeCoinClaimAt !== 'number') plantState.lastFreeCoinClaimAt = null;
      if(typeof plantState.nextFloatingCoinAt !== 'number') plantState.nextFloatingCoinAt = null;
      if(!plantState.dailyMission || typeof plantState.dailyMission !== 'object') plantState.dailyMission = null;
      if(typeof plantState.lastNotifiedStageIdx !== 'number') plantState.lastNotifiedStageIdx = null;
      if(typeof plantState.notifiedFreeCoinDay === 'undefined') plantState.notifiedFreeCoinDay = null;
      delete plantState.lastSpeedActivatedAt;
    }catch(e){}
  } else {
    plantState.lastRealTick = Date.now();
    plantState.startDate = Date.now();
  }
  ensureDailyMission();
}
function savePlantState(){
  plantState.lastRealTick = Date.now();
  safeSet(SAVE_KEY, JSON.stringify(plantState));
}
function savePlantStateSoft(){
  safeSet(SAVE_KEY, JSON.stringify(plantState));
}

/* ================= 날씨 ================= */
function getDayIndex(ts){
  const d = new Date(ts);
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}
function pickWeather(){
  const total = WEATHER_TABLE.reduce((s,w)=>s+w.weight,0);
  let r = Math.random()*total;
  for(const w of WEATHER_TABLE){
    if(r < w.weight) return w;
    r -= w.weight;
  }
  return WEATHER_TABLE[0];
}
function rollWeatherIfNewDay(){
  const today = getDayIndex(Date.now());
  if(plantState.lastWeatherDay !== today){
    const isFirstEver = plantState.lastWeatherDay === null || typeof plantState.lastWeatherDay === 'undefined';
    const w = pickWeather();
    plantState.weather = w.type;
    plantState.lastWeatherDay = today;
    if(!isFirstEver){
      const msg = getWeatherNotifMessage(w.type);
      if(msg) sendLocalNotification(msg.title, msg.body, 'weather-change');
    }
    savePlantState();
  }
}
function getWeatherInfo(){
  return WEATHER_TABLE.find(w=>w.type===plantState.weather) || WEATHER_TABLE[0];
}

/* ================= 일기 시스템 ================= */
function writeDiaryIfNewDay(){
  const today = getDayIndex(Date.now());
  if(plantState.lastDiaryDay === today) return;
  if(plantState.isDead) return;

  plantState.lastDiaryDay = today;

  const p = getPersonality();
  const lines = DIARY_LINES[personalityKey] || DIARY_LINES.active;
  const w = getWeatherInfo();
  const weatherPool = lines[w.type] || lines.sunny;

  let mainPool;
  if(plantState.stats.currentRunHadBadWord){
    mainPool = lines.badword;
  } else if(plantState.stats.talkedToday){
    mainPool = lines.talk;
  } else if(plantState.stats.wateredToday){
    mainPool = lines.water;
  } else {
    mainPool = weatherPool;
  }
  // 🛠️ 오늘 있었던 이벤트 플래그는 일기를 쓴 뒤 전부 초기화해야
  // 다음날 일기에 어제 있었던 일(예: 나쁜 말)이 잘못 이어져 쓰이지 않아요
  plantState.stats.currentRunHadBadWord = false;
  plantState.stats.talkedToday = false;
  plantState.stats.wateredToday = false;

  // 📝 성격별 문장 풀을 조합해서 3~4줄짜리 일기를 만들어요 (같은 문장이 겹치지 않게)
  const used = new Set();
  const diaryLines = [];
  function addLine(pool){
    if(!pool || !pool.length) return;
    const candidates = pool.filter(t=>!used.has(t));
    const pick = candidates.length ? pickRandom(candidates) : pickRandom(pool);
    used.add(pick);
    diaryLines.push(pick);
  }
  addLine(mainPool);
  if(mainPool !== weatherPool) addLine(weatherPool);
  addLine(lines.default);
  // 🛠️ 오늘 특별한 일이 없었다면(=mainPool이 날씨 문장과 같다면) 실제로 없었던
  // "대화" 문장을 억지로 넣지 않고, 마무리 문장을 하나 더 자연스럽게 이어줘요
  addLine(mainPool !== weatherPool ? mainPool : lines.default);

  const d = new Date();
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const dayNum = getCurrentDayNum();

  plantState.diary.push({ dateStr, dayNum, lines: diaryLines, text: diaryLines[0], emoji:p.emoji });
  if(plantState.diary.length > 60) plantState.diary = plantState.diary.slice(-60);

  plantState.diaryRead = false; // 🆕 새 일기가 생겼으니 "안읽음" 배지를 다시 켜줘요

  updateDiaryBadge();
  checkAchievements();
  savePlantState();
}

function updateDiaryBadge(){
  const badge = document.getElementById('diary-badge');
  const today = getDayIndex(Date.now());
  const hasNew = plantState.diary.length > 0 && plantState.lastDiaryDay === today && !plantState.diaryRead;
  badge.style.display = hasNew ? 'flex' : 'none';
}

/* ================= 🎯 일일미션 시스템 ================= */
// 오늘 날짜와 저장된 미션의 날짜가 다르면 새로 초기화해요 (자정 기준)
function ensureDailyMission(){
  const today = getDayIndex(Date.now());
  if(!plantState.dailyMission || plantState.dailyMission.day !== today){
    plantState.dailyMission = { day: today, talkCount:0, petCount:0, talkClaimed:false, petClaimed:false };
  }
}

function updateMissionUI(){
  if(!plantState.dailyMission) return;
  const m = plantState.dailyMission;
  const talkEl = document.getElementById('mission-talk-count');
  const petEl = document.getElementById('mission-pet-count');
  if(talkEl) talkEl.innerText = Math.min(m.talkCount, DAILY_MISSION_TARGET);
  if(petEl) petEl.innerText = Math.min(m.petCount, DAILY_MISSION_TARGET);
  const talkChip = document.getElementById('mission-chip-talk');
  const petChip = document.getElementById('mission-chip-pet');
  if(talkChip) talkChip.classList.toggle('completed', !!m.talkClaimed);
  if(petChip) petChip.classList.toggle('completed', !!m.petClaimed);
}

// type: 'talk' | 'pet' — 말걸기/쓰다듬기 할 때마다 호출해서 진행도를 쌓고,
// 목표(5회) 달성 시 1회만 코인 보상을 지급해요
function registerMissionProgress(type){
  ensureDailyMission();
  const m = plantState.dailyMission;
  if(type === 'talk'){
    m.talkCount++;
    if(m.talkCount >= DAILY_MISSION_TARGET && !m.talkClaimed){
      m.talkClaimed = true;
      plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + DAILY_MISSION_TALK_REWARD);
      updateCoinUI();
      showInfoToast(`❤️ 일일미션 완료! 오늘 5번 대화했어요. ${COIN_ICON_HTML} +${DAILY_MISSION_TALK_REWARD}원`);
    }
  } else if(type === 'pet'){
    m.petCount++;
    if(m.petCount >= DAILY_MISSION_TARGET && !m.petClaimed){
      m.petClaimed = true;
      plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + DAILY_MISSION_PET_REWARD);
      updateCoinUI();
      showInfoToast(`❤️ 일일미션 완료! 오늘 5번 쓰다듬었어요. ${COIN_ICON_HTML} +${DAILY_MISSION_PET_REWARD}원`);
    }
  }
  updateMissionUI();
  savePlantStateSoft();
}

  toast.classList.add('show');

function updateAchvBadge(){
  const badge = document.getElementById('achv-badge');
  const count = Object.keys(plantState.achievements).filter(k=>plantState.achievements[k]).length;
  if(count > 0){
    badge.style.display = 'flex';
    badge.innerText = count;

function checkAchievements(){
  const dayNum = getCurrentDayNum();
  if(dayNum >= 100) unlockAchievement('survive_100');
  if(plantState.stats.waterCount >= 100) unlockAchievement('water_100');
  if(plantState.harvestedBasket.length >= 1) unlockAchievement('first_harvest');
  if(plantState.harvestedBasket.length >= 5) unlockAchievement('harvest_5');
  if(plantState.diary.length >= 7) unlockAchievement('diary_7');
}
function applyWeatherVisual(skipFlash){
  const w = getWeatherInfo();
  document.getElementById('weather-chip').innerText = w.label;

  const bg = document.getElementById('scene-bg');
  const dim = document.getElementById('scene-dim');
  const rain = document.getElementById('rain-layer');

  bg.classList.remove('is-rainy','is-cloudy');
  dim.classList.remove('is-rainy');
  rain.classList.remove('active');
  rain.innerHTML = '';

  if(w.type === 'cloudy'){
    bg.classList.add('is-cloudy');
  } else if(w.type === 'rainy'){
    bg.classList.add('is-rainy');
    dim.classList.add('is-rainy');
    rain.classList.add('active');
    spawnRaindrops();
    if(!skipFlash) maybeFlashLightning();
    startLightningLoop();
  } else {
    stopLightningLoop();
  }
}
let lightningInterval = null;
function startLightningLoop(){
  if(lightningInterval) return;
  lightningInterval = setInterval(()=>{
    if(plantState.weather === 'rainy' && Math.random() < 0.35){
      maybeFlashLightning();
    }
  }, 8000);
}
function stopLightningLoop(){
  if(lightningInterval){ clearInterval(lightningInterval); lightningInterval = null; }
}
function maybeFlashLightning(){
  const flash = document.getElementById('lightning-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');
}
function spawnRaindrops(){
  const rain = document.getElementById('rain-layer');
  const count = isMobile ? 26 : 36;
  for(let i=0;i<count;i++){
    const d = document.createElement('div');
    d.className = 'raindrop';
    d.style.left = Math.random()*100+'%';
    d.style.animationDuration = (0.5 + Math.random()*0.4)+'s';
    d.style.animationDelay = (Math.random()*1.2)+'s';
    d.style.opacity = (0.3 + Math.random()*0.4).toFixed(2);
    rain.appendChild(d);
  }
}

/* ================= ⏩ 배속 시스템 (24시간 중 1시간만 사용 가능) ================= */
/* 배속을 켠 뒤 "실시간으로" 예산이 얼마나 남았는지 계산 (저장은 하지 않는 순수 조회용) */
function getLiveSpeedBudgetMs(nowTs){
  nowTs = nowTs || Date.now();
  let budget = typeof plantState.speedBudgetMs === 'number' ? plantState.speedBudgetMs : SPEED_BUDGET_TOTAL_MS;
  if(plantState.speedMultiplier > 1 && plantState.speedCheckpoint){
    budget = budget - (nowTs - plantState.speedCheckpoint);
  }
  return Math.max(0, Math.min(SPEED_BUDGET_TOTAL_MS, budget));
}
/* 예산을 다 쓴 뒤 다음 충전까지 남은 대기 시간 */
function getSpeedCooldownRemainingMs(nowTs){
  nowTs = nowTs || Date.now();
  if(!plantState.speedExhaustedAt) return 0;
  return Math.max(0, SPEED_CYCLE_MS - (nowTs - plantState.speedExhaustedAt));
}
function formatCooldown(ms){
  const totalMin = Math.max(1, Math.ceil(ms / 60000));
  const hours = Math.floor(totalMin / 60);
  const mins = totalMin % 60;
  if(hours > 0 && mins > 0) return `${hours}시간 ${mins}분`;
  if(hours > 0) return `${hours}시간`;
  return `${mins}분`;
}
function formatMMSS(ms){
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
/* 🔋 경계 상황(예산 소진 / 24시간 재충전)만 실제로 상태에 반영합니다.
   켜져 있는 동안의 "실시간 소모"는 getLiveSpeedBudgetMs()로 계산만 하고,
   여기서는 확정된 시점(끄기/게임틱/24시간 경과)에만 저장해서 성장 계산에 영향이 없도록 합니다. */
function refreshSpeedState(nowTs){
  nowTs = nowTs || Date.now();
  let changed = false;

  if(plantState.speedExhaustedAt && (nowTs - plantState.speedExhaustedAt) >= SPEED_CYCLE_MS){
    plantState.speedBudgetMs = SPEED_BUDGET_TOTAL_MS;
    plantState.speedExhaustedAt = null;
    changed = true;
  }

  if(plantState.speedMultiplier > 1 && getLiveSpeedBudgetMs(nowTs) <= 0){
    plantState.speedMultiplier = 1;
    plantState.speedBudgetMs = 0;
    plantState.speedCheckpoint = null;
    plantState.speedExhaustedAt = nowTs;
    showInfoToast('⏳ 배속 1시간을 모두 사용했어요. 24시간 후 다시 충전돼요.');
    changed = true;
  }

  if(changed){
    updateSpeedBadge();
    updateSpeedModalIfOpen();
    savePlantState();
  }
  return changed;
}
function toggleSpeedMode(enabled){
  const now = Date.now();
  refreshSpeedState(now);

  if(enabled){
    if(plantState.speedMultiplier > 1){
      openModal('speed');
      return;
    }
    const cooldownMs = getSpeedCooldownRemainingMs(now);
    if(cooldownMs > 0){
      showInfoToast(`⏳ 배속 1시간을 모두 사용했어요. ${formatCooldown(cooldownMs)} 후 다시 사용할 수 있어요.`);
      openModal('speed');
      return;
    }
    if(getLiveSpeedBudgetMs(now) <= 0){
      showInfoToast('⏳ 오늘 사용할 수 있는 배속 시간이 없어요.');
      openModal('speed');
      return;
    }
    plantState.speedMultiplier = FIXED_SPEED_MULTIPLIER;
    plantState.speedCheckpoint = now;
    showBubble(`⏩ x${FIXED_SPEED_MULTIPLIER} 배속 시작!`);
  } else {
    // 지금까지 사용한 만큼만 예산에서 확정해서 차감하고 끕니다 (남은 시간은 계속 보존됨)
    plantState.speedBudgetMs = getLiveSpeedBudgetMs(now);
    plantState.speedMultiplier = 1;
    plantState.speedCheckpoint = null;
    showInfoToast('⏸️ x8 배속을 껐어요.');
  }
  updateSpeedBadge();
  savePlantState();
  openModal('speed');
}
function updateSpeedBadge(){
  const badge = document.getElementById('speed-badge');
  const miniBadge = document.getElementById('speed-mini-badge');
  const isOn = plantState.speedMultiplier > 1;
  if(badge){
    if(isOn){
      badge.classList.add('show');
      badge.innerText = `⏩ x${FIXED_SPEED_MULTIPLIER} · ${formatMMSS(getLiveSpeedBudgetMs())}`;
    } else {
      badge.classList.remove('show');
    }
  }
  if(miniBadge){
    miniBadge.style.display = isOn ? 'flex' : 'none';
  }
}
/* 배속 모달이 열려 있을 때 1초마다 실시간으로 다시 그려서 바가 줄어드는 걸 보여줍니다 */
function updateSpeedModalIfOpen(){
  const overlay = document.getElementById('global-modal');
  if(!overlay || overlay.style.display !== 'flex') return;
  if(!document.getElementById('speed-budget-fill')) return;
  renderSpeedModalContent();
}
function renderSpeedModalContent(){
  const content = document.getElementById('modal-content-area');
  if(!content) return;
  const now = Date.now();
  const isSpeedOn = plantState.speedMultiplier > 1;
  const liveBudget = getLiveSpeedBudgetMs(now);
  const pct = Math.max(0, Math.min(100, (liveBudget / SPEED_BUDGET_TOTAL_MS) * 100));
  const cooldownMs = getSpeedCooldownRemainingMs(now);
  const canTurnOn = isSpeedOn || (liveBudget > 0 && cooldownMs <= 0);
  const speedGuide = isSpeedOn
    ? '지금 x8 배속으로 자라는 중이에요.'
    : (canTurnOn
        ? '지금 바로 x8 배속을 켤 수 있어요.'
        : `다음 충전까지 ${formatCooldown(cooldownMs)} 남았어요.`);
  const extraNote = (!isSpeedOn && cooldownMs > 0)
    ? `1시간을 모두 사용해서 쉬는 중이에요. (${formatCooldown(cooldownMs)} 후 다시 충전)`
    : '';

  content.innerHTML = `
    <div class="modal-title">시간 배속</div>
    <p class="modal-sub">배속은 하루 <b>최대 1시간</b>까지 쓸 수 있어요.</p>
    <div class="setting-row">
      <div>
        <div class="setting-label">배속 켜기</div>
        <div class="modal-opt-sub">${speedGuide}</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="speed-toggle" ${isSpeedOn?'checked':''} ${(!isSpeedOn && !canTurnOn)?'disabled':''} onchange="toggleSpeedMode(this.checked)">
        <span class="switch-track"></span>
      </label>
    </div>
    <div class="speed-budget-block">
      <div class="speed-budget-label">
        <span>오늘 남은 배속 시간</span>
        <span id="speed-budget-text">${formatMMSS(liveBudget)}</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill speed-fill" id="speed-budget-fill" style="width:${pct}%"></div></div>
    </div>
    <p class="modal-sub" style="margin-top:10px;">${extraNote}</p>
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
  `;
}
/* ⏱️ 배지/모달의 남은 시간 표시를 1초마다 갱신 (실제 저장은 여기서 하지 않아요 - 성장 계산용 시각과 분리) */
setInterval(()=>{
  if(plantState.isDead) return;
  refreshSpeedState(Date.now());
  updateSpeedBadge();
  updateSpeedModalIfOpen();
}, 1000);

/* ================= 게임 틱 (현실시간 기반 + 배속 보너스) ================= */
function gameTick(){
  if(plantState.isDead) return;

  refreshSpeedState(Date.now());
  rollWeatherIfNewDay();
  applyWeatherVisual();
  writeDiaryIfNewDay();
  ensureDailyMission();
  checkFreeCoinNotification();

  const now = Date.now();
  const elapsedMs = now - plantState.lastRealTick;
  let elapsedDays = elapsedMs / (24*60*60*1000);

  if(plantState.speedMultiplier > 1 && elapsedMs > 0){
    elapsedDays *= FIXED_SPEED_MULTIPLIER;
  }

  if(elapsedDays <= 0){ updateUI(); return; }

  if(plantState.isHarvestable){
    plantState.lastRealTick = now;
    updateUI();
    renderPlant();
    savePlantState();
    return;
  }

  const p = getPersonality();
  const w = getWeatherInfo();
  const rainRelief = w.type === 'rainy' ? 0.5 : 1;
  const dry = (WATER_DRY_PER_DAY[plantState.location] || 10) * elapsedDays * rainRelief * p.dryMul;
  const sunTarget = (SUN_GAIN_PER_DAY[plantState.location] || 8) * w.sunMul;
  const rainGain = (w.type === 'rainy' && OUTDOOR_RAIN_LOCATIONS.includes(plantState.location)) ? (RAIN_WATER_GAIN_PER_DAY * elapsedDays) : 0;

  plantState.water = clamp(plantState.water - dry + rainGain, 0, 100);
  plantState.sun = clamp(plantState.sun*Math.pow(0.85, elapsedDays) + sunTarget*elapsedDays, 0, 100);

  /* 🩺 죽기 전에 미리 "아파요" 신호를 보내줘요 (표정 변화 + 말풍선 경고, 상태가 나아지면 다시 알려줄 수 있도록 리셋) */
  if(plantState.water <= 20){
    if(!plantState._warnedDry){ showBubble('...몸이 좀 안 좋아요... 물이 필요해요 🥀'); plantState._warnedDry = true; }
  } else {
    plantState._warnedDry = false;
  }
  if(plantState.water >= 88){
    if(!plantState._warnedWet){ showBubble('...속이 울렁거려요... 물이 너무 많아요 😖'); plantState._warnedWet = true; }
  } else {
    plantState._warnedWet = false;
  }
  if(plantState.sun >= 90){
    if(!plantState._warnedHot){ showBubble('...너무 뜨거워요... 시원한 곳이 필요해요 🥵'); plantState._warnedHot = true; }
  } else {
    plantState._warnedHot = false;
  }
  if(plantState.badWordCount >= 14){
    if(!plantState._warnedSad){ showBubble('...마음이 자꾸 시들어가는 것 같아요...'); plantState._warnedSad = true; }
  } else {
    plantState._warnedSad = false;
  }

  if(plantState.water > 10 && plantState.water < 95){
    let growthGain = GROWTH_PER_DAY * elapsedDays * w.growthMul * p.growthMul;
    const sunFactor = clamp(plantState.sun/50, 0.35, 1.3);
    growthGain *= sunFactor;
    plantState.growth = clamp(plantState.growth + growthGain, 0, 100);
  }

  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.isHarvestable = true;
    plantState.growth = 100;
  }

  if(personalityKey === 'playful' && plantState.water < 35 && Math.random() < p.complainChance){
    showBubble('아오!! 개미때문에 간지러워!!-_-');
  }

  plantState.lastRealTick = now;
  checkDeathConditions();
  updateUI();
  renderPlant();
  savePlantState();
}

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* 📅 "며칠째"는 실제 달력 날짜 차이로 계산합니다 (시간대/서머타임/밀리초 오차의 영향을 받지 않도록) */
function calcDayNum(startTs, nowTs){
  const start = new Date(startTs);
  const now = new Date(nowTs);
  const startMid = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((nowMid - startMid) / (24*60*60*1000));
  return Math.max(1, diffDays + 1);
}
function getCurrentDayNum(){
  return calcDayNum(plantState.startDate, Date.now());
}

/* ================= 죽음 판정 ================= */
function checkDeathConditions(){
  if(plantState.isHarvestable) return;
  if(plantState.water <= 0){
    triggerDeath("물을 너무 오래 주지 않아서 바짝 말라버렸어요. 규칙적으로 물을 주는 게 중요해요.");
  } else if(plantState.water >= 100){
    triggerDeath("뿌리가 계속 물에 잠겨 있어서 과습으로 썩어버렸어요. 가끔은 흙이 마를 시간도 필요해요.");
  } else if(plantState.badWordCount >= 20){
    triggerDeath("차가운 말이 오랫동안 쌓여서 마음이 시들어버렸어요.");
  }
}
function triggerDeath(reason){
  plantState.isDead = true;
  plantState.deathReason = reason;
  document.getElementById('death-reason').innerText = reason;
  document.getElementById('game-over-screen').style.display = 'flex';
  savePlantState();
}
function restartToGardenSelect(){
  safeRemove(SAVE_KEY);
  safeRemove(PLANTNAME_KEY);
  safeRemove(PERSONALITY_KEY_STORAGE);
  plantSlots = plantSlots.filter(s=>s.id!==currentSlotId);
  safeSet(SLOTS_KEY, JSON.stringify(plantSlots));
  if(plantSlots.length > 0){
    // 🌱 아직 키우고 있는 다른 식물이 있으면 그 식물 화면으로 이동해요
    safeSet(CURRENT_SLOT_KEY, String(plantSlots[0].id));
    window.location.reload();
  } else {
    safeRemove(`miniGarden_currentPlantDir_${nickname}`);
    window.location.href = '../../index.html';
  }
}

/* ⚙️🌱 설정 화면에서 "새로 키우기"를 누르면, 죽음/수확과 무관하게 지금 키우고 있는
   식물의 저장 데이터(성장 기록·수확 바구니·일기·업적·이름·성격)를 전부 지우고
   같은 슬롯을 다시 씨앗부터 시작할 수 있는 상태로 되돌려요. 되돌릴 수 없으니 반드시 확인을 받습니다. */
function requestRestartCurrentPlant(){
  const ok = confirm(
    `정말 "${plantName}"(${PLANT_INFO.name}) 키우기를 그만두고 처음부터 새로 시작할까요?\n\n` +
    `지금까지 쌓인 성장 기록, 수확 바구니, 일기, 업적이 모두 사라지고 되돌릴 수 없어요.`
  );
  if(!ok) return;
  closeModal();
  restartToGardenSelect();
}

/* ================= UI 업데이트 ================= */
function updateUI(){
  ensureDailyMission();
  updateMissionUI();

  document.getElementById('txt-growth').innerText = Math.floor(plantState.growth);
  document.getElementById('txt-water').innerText = Math.floor(plantState.water);
  document.getElementById('txt-sun').innerText = Math.floor(plantState.sun);

  document.getElementById('bar-growth').style.width = plantState.growth + '%';
  document.getElementById('bar-water').style.width = plantState.water + '%';
  document.getElementById('bar-sun').style.width = plantState.sun + '%';

  const waterBadge = document.getElementById('water-full-badge');
  if(waterBadge) waterBadge.style.display = plantState.water >= WATER_CAP ? 'inline' : 'none';

  const dayNum = getCurrentDayNum();
  const d = new Date();
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('game-date-display').innerText = `${dateStr} (${dayNum}일차)`;

  const stageInfo = getStageInfo(plantState.growth);
  document.getElementById('view-stage-text').innerText = stageInfo.label;

  // 🔔 성장 단계가 올라갈 때마다(씨앗 → ... → 수확 가능) 알림을 한 번씩 보내줘요
  if(!plantState.isDead){
    if(typeof plantState.lastNotifiedStageIdx !== 'number'){
      plantState.lastNotifiedStageIdx = stageInfo.idx; // 최초 로드시엔 알림 없이 기준값만 설정
    } else if(stageInfo.idx > plantState.lastNotifiedStageIdx){
      plantState.lastNotifiedStageIdx = stageInfo.idx;
      const isHarvest = stageInfo.idx === 11;
      sendLocalNotification(
        isHarvest ? `${PLANT_INFO.icon} ${plantName}이(가) 수확 가능해요!` : `🌱 ${plantName}이(가) 자랐어요!`,
        isHarvest ? `${PLANT_INFO.name}가 다 익었어요. 지금 수확해보세요!` : `이제 '${stageInfo.label}' 단계예요. 정원을 확인해보세요.`,
        'stage-change'
      );
      savePlantStateSoft();
    }
  }

  const hint = document.getElementById('harvest-hint');
  const svg = document.getElementById('plant-svg');
  if(plantState.isHarvestable && !plantState.isDead){
    hint.classList.add('show');
    svg.classList.add('harvest-pulse');
  } else {
    hint.classList.remove('show');
    svg.classList.remove('harvest-pulse');
  }

  updateBasketBadge();
  updateCoinUI();
  refreshDailyFreeCoinButton();
  document.getElementById('badword-mini-count').innerText = plantState.badWordCount;
}

function updateCoinUI(){
  const coinEl = document.getElementById('coin-total');
  if(coinEl) coinEl.innerText = Math.floor(plantState.coins || 0);
}
function getDailyFreeCoinRemainingMs(){
  if(!plantState.lastFreeCoinClaimAt) return 0;
  return Math.max(0, DAILY_FREE_COIN_COOLDOWN_MS - (Date.now() - plantState.lastFreeCoinClaimAt));
}
function refreshDailyFreeCoinButton(){
  const btn = document.getElementById('daily-free-coin-btn');
  if(!btn) return;
  btn.classList.toggle('hidden', getDailyFreeCoinRemainingMs() > 0);
}
function scheduleNextFloatingCoinTime(baseTs){
  const base = typeof baseTs === 'number' ? baseTs : Date.now();
  plantState.nextFloatingCoinAt = base + FLOATING_COIN_MIN_DELAY_MS + Math.random() * (FLOATING_COIN_MAX_DELAY_MS - FLOATING_COIN_MIN_DELAY_MS);
}
function initFloatingCoinSystem(){
  if(typeof plantState.nextFloatingCoinAt !== 'number' || !plantState.nextFloatingCoinAt){
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
  }
  clearInterval(initFloatingCoinSystem._timer);
  initFloatingCoinSystem._timer = setInterval(checkFloatingCoinSpawn, 30 * 1000);
  checkFloatingCoinSpawn();
}
function checkFloatingCoinSpawn(){
  if(document.hidden || plantState.isDead) return;
  if(typeof plantState.nextFloatingCoinAt !== 'number' || !plantState.nextFloatingCoinAt){
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
    return;
  }
  if(Date.now() >= plantState.nextFloatingCoinAt){
    spawnFloatingCoin();
    scheduleNextFloatingCoinTime();
    savePlantStateSoft();
  }
}
function spawnFloatingCoin(){
  const layer = document.getElementById('floating-coin-layer');
  if(!layer || layer.querySelector('.floating-coin')) return;
  const coin = document.createElement('button');
  coin.type = 'button';
  coin.className = 'floating-coin';
  coin.innerText = '₩';
  coin.style.left = (Math.random() * 68 + 10) + '%';
  coin.style.top = (Math.random() * 44 + 18) + '%';
  coin.addEventListener('click', function(ev){
    ev.stopPropagation();
    coin.remove();
    plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + FLOATING_COIN_VALUE);
    updateCoinUI();
    showInfoToast(`${COIN_ICON_HTML} 랜덤 코인 +${FLOATING_COIN_VALUE}원 획득!`);
    savePlantStateSoft();
  });
  layer.appendChild(coin);
  setTimeout(()=>{ if(coin.isConnected) coin.remove(); }, 18000);
}
function claimDailyFreeCoin(){
  if(getDailyFreeCoinRemainingMs() > 0) return;
  const btn = document.getElementById('daily-free-coin-btn');
  if(btn) btn.classList.add('shake');
  const reward = Math.floor(Math.random() * (DAILY_FREE_COIN_MAX - DAILY_FREE_COIN_MIN + 1)) + DAILY_FREE_COIN_MIN;
  setTimeout(()=>{
    if(btn) btn.classList.remove('shake');
    plantState.coins = Math.max(0, Math.floor(plantState.coins || 0) + reward);
    plantState.lastFreeCoinClaimAt = Date.now();
    updateCoinUI();
    refreshDailyFreeCoinButton();
    showInfoToast(`🍀 오늘의 무료 코인! +${reward}원 획득했어요!`);
    savePlantStateSoft();
  }, 420);
}
function renderShopModal(){
  const coins = Math.floor(plantState.coins || 0);
  return `
    <div class="modal-title">🛒 코인 상점</div>
    <div class="coin-balance-card">보유 코인 · ${COIN_ICON_HTML} ${coins}원</div>
    <div class="shop-grid">
      ${SHOP_ITEMS.map(item=>`
        <div class="shop-card">
          <span class="shop-card-title">${item.icon} ${item.title}</span>
          <span class="shop-card-desc">${item.desc}</span>
          <span class="shop-card-price">${item.cost}원</span>
          <button class="shop-buy-btn ${item.cost >= 1000 ? 'expensive' : ''}" onclick="buyShopItem('${item.key}')" ${coins < item.cost ? 'disabled' : ''}>구매하기</button>
        </div>
      `).join('')}
    </div>
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
  `;
}
function buyShopItem(key){
  const item = SHOP_ITEMS.find(v=>v.key === key);
  if(!item) return;
  const coins = Math.floor(plantState.coins || 0);
  if(coins < item.cost){
    showInfoToast(`${COIN_ICON_HTML} 코인이 부족해요!`);
    return;
  }
  if(key === 'dehumidifier' && plantState.water <= 15){
    showInfoToast('💧 지금은 수분제거가 필요 없어요.');
    return;
  }
  // 🛑 구매 전 확인: 코인은 즉시 차감되고 아이템은 바로 식물에게 사용되니, 실수 구매를 막기 위해 한 번 더 확인받아요.
  const ok = confirm(`"${item.title}"(${item.cost}원)를 구매할까요?\n\n구매하면 바로 ${plantName}에게 사용돼요.`);
  if(!ok) return;
  plantState.coins = coins - item.cost;
  if(key === 'nutrient'){
    plantState.growth = clamp(plantState.growth + 3, 0, 100);
    plantState.water = clamp(plantState.water + 8, 0, WATER_CAP);
    plantState.sun = clamp(plantState.sun + 8, 0, 100);
    showBubble('영양이 쏙쏙 들어와요!');
  } else if(key === 'dehumidifier'){
    plantState.water = clamp(plantState.water - 25, 0, 100);
    showBubble('과한 수분이 정리돼서 한결 가벼워요!');
  } else if(key === 'sunlight'){
    plantState.sun = clamp(plantState.sun + 25, 0, 100);
    showBubble('햇살을 듬뿍 받았어요!');
  } else if(key === 'growth_booster'){
    plantState.growth = clamp(plantState.growth + 12, 0, 100);
    showBubble('쑥쑥 자랄 힘이 생겼어요!');
  }
  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.growth = 100;
    plantState.isHarvestable = true;
  }
  updateUI();
  renderPlant();
  checkDeathConditions();
  const content = document.getElementById('modal-content-area');
  if(content) content.innerHTML = renderShopModal();
  savePlantState();
}

function updateBasketBadge(){
  const badge = document.getElementById('basket-badge');
  const count = plantState.harvestedBasket.length;
  if(count > 0){
    badge.style.display = 'flex';
    badge.innerText = count > 99 ? '99+' : count;
  } else {
    badge.style.display = 'none';
  }
}

/* ================= 성장 단계 (12단계) ================= */
function getStageInfo(growth){
  const idx = Math.min(11, Math.floor(growth/(100/12)));
  const labels = PLANT_INFO.stageLabels;
  const label = idx === 11 ? `${PLANT_INFO.icon} ${labels[idx]}` : labels[idx];
  return { idx, label };
}

/* ================= 식물 SVG 렌더링 ================= */
function renderPlant(){
  const { idx } = getStageInfo(plantState.growth);
  const svg = document.getElementById('plant-svg');
  svg.innerHTML = buildPlantSVG(idx) + buildPotFace();
}

function getPotMood(){
  if(tempMoodOverride) return tempMoodOverride;
  if(plantState.isDead) return 'dead';
  if(plantState.isHarvestable) return 'happy';
  if(plantState.badWordCount >= 14) return 'sad';
  if(plantState.water <= 15) return 'thirsty';
  if(plantState.water >= 90) return 'soggy';
  if(plantState.sun >= 92) return 'hot';
  if(plantState.sun <= 15) return 'sleepy';
  if(plantState.water >= 55 && plantState.water <= 85 && plantState.sun >= 40) return 'content';
  return 'neutral';
}

    extra = `<ellipse class="pot-face-sweat" cx="${cx+17}" cy="${cy-7}" rx="2" ry="3"/><ellipse class="pot-face-sweat" cx="${cx-17}" cy="${cy-6}" rx="1.6" ry="2.4"/>`;
  } else if(mood === 'angry'){
    /* 💢 너무 많이 쓰다듬어서 화가 났을 때 */
    eyes = `<path class="pot-face-mouth" d="M${cx-eyeDX-4},${eyeY-4} l 7,3" />
            <path class="pot-face-mouth" d="M${cx+eyeDX+3},${eyeY-4} l -7,3" />`;
    mouth = `<path class="pot-face-mouth" d="M${cx-6},${cy+9} q 6,-4 12,0" />`;
    extra = `<path class="pot-face-mouth" d="M${cx+16},${cy-14} l 5,-3 m -5,0 l 5,3 m -8,-1 l 4,-4 m -4,0 l 4,4" style="stroke:var(--tomato); stroke-width:1.6;"/>`;
  } else {
    eyes = `<circle class="pot-face-eye" cx="${cx-eyeDX}" cy="${eyeY}" r="1.8"/>
            <circle class="pot-face-eye" cx="${cx+eyeDX}" cy="${eyeY}" r="1.8"/>`;
    mouth = `<path class="pot-face-mouth" d="M${cx-5},${cy+7} l 10,0" />`;
  }

  return `<g transform="translate(0,-55)">${eyes}${mouth}${extra}</g>`;
}

function buildPlantSVG(stage){
const isGrape = PLANT_TYPE === 'grape';
const stemH = 14 + stage*15;
const baseY = 220;
const topY = baseY - stemH;
const leafCount = Math.min(8, stage+1);
const hasFlower = stage === 6 || stage === 7;
const fruitCount = stage >= 8 ? Math.min(4, stage - 6) : 0;
const fruitColorUnripe = PLANT_INFO.fruitColorUnripe;
const fruitColorMid = PLANT_INFO.fruitColorMid;
const fruitColorRipe = PLANT_INFO.fruitColorRipe;
const fruitColorRipeDeep = PLANT_INFO.fruitColorRipeDeep;
const fruitColor = stage <= 9 ? fruitColorUnripe : stage === 10 ? fruitColorMid : fruitColorRipe;
const fruitRipe = stage >= 11;

let leaves = '';
for(let i=0;i<leafCount;i++){
const t = i/(leafCount-1 || 1);
const y = baseY - 14 - t*(stemH-20 > 0 ? stemH-20 : 0);
const dir = i % 2 === 0 ? 1 : -1;
const size = 13 + (i%3)*3;
leaves += `       <g transform="translate(100,${y})">         <path d="M0,0 Q ${dir*size*1.8},${-size*0.4} ${dir*size*2.2},${size*0.3} Q ${dir*size*1.2},${size*0.9} 0,0 Z"
              fill="#5fae6c" stroke="#3f8a52" stroke-width="1.2"/>       </g>`;
}

let pot = `     <g>       <path d="M62,220 L138,220 L130,238 Q100,244 70,238 Z" fill="${PLANT_INFO.potColor}"/>       <rect x="58" y="212" width="84" height="12" rx="4" fill="${PLANT_INFO.potColorLight}"/>       <ellipse cx="100" cy="213" rx="42" ry="7" fill="#7a5235" opacity="0.55"/>     </g>`;

let seedStage = stage === 0 ? `       <ellipse cx="100" cy="214" rx="7" ry="9" fill="#8a5a2e"/>
  ` : '';

let stem = stage > 0 ? `     <path d="M100,${baseY} C ${96},${topY+40} ${104},${topY+20} 100,${topY}"
          stroke="#3f8a52" stroke-width="${6+stage*0.6}" fill="none" stroke-linecap="round"/>
  ` : '';

/* 🍅 토마토는 노란 5장짜리 꽃, 🍇 포도는 작은 연둣빛 꽃송이(포도꽃)로 표현해요 */
let flower = '';
if(hasFlower){
  if(isGrape){
    const dots = [[-6,-2],[6,-2],[-3,5],[3,5],[0,-8],[0,3]];
    flower = `     <g transform="translate(100,${topY-6})">       ${dots.map(([dx,dy])=>`<circle cx="${dx}" cy="${dy}" r="2.6" fill="#eef7df" stroke="#c8dba0" stroke-width="0.8"/>`).join('')}     </g>
  `;
  } else {
    flower = `     <g transform="translate(100,${topY-6})">       <circle r="4" fill="#ffd54f"/>
      ${[0,72,144,216,288].map(a=>`<ellipse cx="${8*Math.cos(a*Math.PI/180)}" cy="${8*Math.sin(a*Math.PI/180)}" rx="5" ry="3.2" fill="#fff3b0" transform="rotate(${a},${8*Math.cos(a*Math.PI/180)},${8*Math.sin(a*Math.PI/180)})"/>`).join('')}     </g>
  `;
  }
}

/* 🍅 토마토는 동그란 열매 하나씩, 🍇 포도는 작은 알갱이가 뭉친 송이로 그려요 */
let fruits = '';
for(let i=0;i<fruitCount;i++){
const fx = 100 + (i%2===0 ? -1 : 1) * (14 + i*4);
const fy = topY + 24 + i*10;
if(isGrape){
  const rBerry = 3.4 + Math.min(stage-8,3)*0.7;
  const berryOffsets = [[0,-rBerry*1.5],[-rBerry*1.3,-rBerry*0.2],[rBerry*1.3,-rBerry*0.2],[-rBerry*0.9,rBerry*1.2],[rBerry*0.9,rBerry*1.2],[0,rBerry*2.3]];
  const berries = berryOffsets.map(([bx,by])=>`       <circle cx="${bx}" cy="${by}" r="${rBerry}" fill="${fruitRipe ? fruitColorRipe : fruitColor}" stroke="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" stroke-width="1"/>
        ${fruitRipe ? `<ellipse cx="${bx-rBerry*0.3}" cy="${by-rBerry*0.3}" rx="${rBerry*0.26}" ry="${rBerry*0.14}" fill="rgba(255,255,255,0.35)"/>` : ''}`).join('');
  fruits += `      <g transform="translate(${fx},${fy})">         <path d="M0,${-rBerry*1.5} q -2,-5 -5,-5" stroke="#3f8a52" stroke-width="2" fill="none" stroke-linecap="round"/>
${berries}       </g>`;
} else {
  const r = 8 + Math.min(stage-8,3)*1.6;
  fruits += `      <g transform="translate(${fx},${fy})">         <circle r="${r}" fill="${fruitRipe ? fruitColorRipe : fruitColor}" stroke="${fruitRipe ? fruitColorRipeDeep : '#5d7a3a'}" stroke-width="1.2"/>         <path d="M0,${-r} q -2,-5 -5,-5" stroke="#3f8a52" stroke-width="2" fill="none" stroke-linecap="round"/>
        ${fruitRipe ?`<ellipse cx="${-r*0.3}" cy="${-r*0.3}" rx="${r*0.25}" ry="${r*0.15}" fill="rgba(255,255,255,0.35)"/>` : ''}       </g>`;
}
}

let groundShadow = `     <ellipse cx="100" cy="243" rx="48" ry="8" fill="#000000" opacity="0.16"/>`;

return `     <g transform="translate(0,-70)">
      ${groundShadow}
      ${pot}
      ${seedStage}
      ${stem}
      ${leaves}
      ${flower}
      ${fruits}     </g>
  `;
}


/* ================= 인터랙션 ================= */
function waterPlant(){
  if(plantState.isDead) return;

  if(plantState.water >= WATER_CAP){
    showInfoToast("💧 지금은 충분히 촉촉해요. 조금 마르면 다시 주세요.");
    return;
  }

  plantState.water = clamp(Math.max(plantState.water, 70) + 4, 0, WATER_CAP);

  plantState.stats.waterCount = (plantState.stats.waterCount || 0) + 1;
  plantState.stats.runWaterCount = (plantState.stats.runWaterCount || 0) + 1;
  plantState.stats.hasWateredAnyDay = true;
  plantState.stats.wateredToday = true;
  if(getWeatherInfo().type !== 'rainy'){
    plantState.stats.wateredOnlyOnRain = false;
  }

  showBubble("꿀꺽꿀꺽! 시원해요!");
  updateUI();
  checkDeathConditions();
  checkAchievements();
  savePlantState();
}

document.getElementById('touch-stage').addEventListener('click', function(e){
  if(plantState.isHarvestable && !plantState.isDead){
    startHarvest();

  petPlant();
});

function petPlant(){
  if(plantState.isDead) return;
  petCount++;
  registerMissionProgress('pet');
  const svg = document.getElementById('plant-svg');
  svg.classList.remove('sway');
  svg.classList.remove('pet-shake');
  void svg.offsetWidth;
  svg.classList.add('pet-shake');
  setTimeout(()=>{ svg.classList.remove('pet-shake'); svg.classList.add('sway'); }, 600);

  // 💚 만졌을 때 잠깐 기분 좋은 표정으로 바뀌었다가 원래 상태로 돌아와요
  // 💢 단, 너무 많이(7번 이상 연속) 만지면 화난 표정으로 바뀌어요
  const willBeTooMuch = petCount >= 7;
  if(!plantState.isHarvestable){
    tempMoodOverride = willBeTooMuch ? 'angry' : 'pleased';
    renderPlant();
    clearTimeout(petPlant._moodTimer);
    petPlant._moodTimer = setTimeout(()=>{ tempMoodOverride = null; renderPlant(); }, willBeTooMuch ? 2200 : 1800);
  }

  showBubble(willBeTooMuch ? "너무 많이 만지지 마세요! 💢" : "정원사님의 따뜻한 손길! 💚");

  clearTimeout(petResetTimer);
  if(petCount >= 7){
    petCount = 0;
  } else {
    petResetTimer = setTimeout(()=>{ petCount = 0; }, 3000);
  }
}

let pendingGoldenTomato = false;

function startHarvest(){
  document.getElementById('harvest-hint').classList.remove('show');
  const dayNum = getCurrentDayNum();

  pendingGoldenTomato = Math.random() < 0.01;

  const bigTomatoEl = document.querySelector('#harvest-celebrate-screen .big-tomato');
  if(pendingGoldenTomato){
    bigTomatoEl.innerText = '🌟';
    document.getElementById('harvest-celebrate-text').innerText =
      `놀라워요! "${plantName}"가 전설의 ${PLANT_INFO.goldenName}가 되었어요! 정말 희귀한 일이에요!`;
  } else {
    bigTomatoEl.innerText = PLANT_INFO.icon;
    document.getElementById('harvest-celebrate-text').innerText =
      `${nickname} 정원사님이 ${dayNum}일 동안 정성껏 돌본 "${plantName}"가 먹음직스럽게 익었어요!`;
  }

  document.getElementById('harvest-celebrate-screen').style.display = 'flex';
}

/* 🍅 애정도 점수 계산: 물주기/대화 빈도(일수 대비) - 나쁜말 페널티 */
function computeAffection(dayNum, waterCount, talkGoodCount, badWordCount){
  const ratio = (waterCount + talkGoodCount*1.4) / Math.max(1, dayNum);
  let score = clamp(ratio * 55, 0, 100);
  score -= badWordCount * 8;
  score = clamp(score, 0, 100);
  let tier, face, freshness;
  if(score >= 75){ tier='최상'; face='😍'; freshness='아주 신선하고 탱탱해요'; }
  else if(score >= 50){ tier='좋음'; face='🙂'; freshness='싱싱하고 좋은 상태예요'; }
  else if(score >= 25){ tier='보통'; face='😐'; freshness='적당히 잘 익었어요'; }
  else { tier='아쉬움'; face='😟'; freshness='조금 무관심 속에서 자랐어요'; }
  return { score, tier, face, freshness };
}

function confirmHarvest(){
  const dayNum = getCurrentDayNum();
  const d = new Date();
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

  plantState.harvestedBasket.push({
    day: dayNum,
    dateStr: dateStr,
    plantName: plantName,
    isGolden: pendingGoldenTomato,
    personalityKey: personalityKey,
    waterCount: plantState.stats.runWaterCount || 0,
    talkGoodCount: plantState.stats.runTalkGoodCount || 0,
    badWordCount: plantState.stats.runBadWordCount || 0
  });

  unlockAchievement('first_harvest');
  if(plantState.harvestedBasket.length >= 5) unlockAchievement('harvest_5');
  if(pendingGoldenTomato) unlockAchievement('golden_tomato');
  if(!plantState.stats.runHasBadWord) unlockAchievement('no_bad_word');
  if(plantState.stats.hasWateredAnyDay && plantState.stats.wateredOnlyOnRain) unlockAchievement('rainy_only');

  plantState.growth = 0;
  plantState.water = 50;
  plantState.sun = 50;
  plantState.isHarvestable = false;
  plantState.startDate = Date.now();
  plantState.lastRealTick = Date.now();
  plantState.stats.wateredOnlyOnRain = true;
  plantState.stats.hasWateredAnyDay = false;
  plantState.stats.currentRunHadBadWord = false;
  plantState.stats.runHasBadWord = false;
  plantState.stats.runWaterCount = 0;
  plantState.stats.runTalkGoodCount = 0;
  plantState.stats.runBadWordCount = 0;
  pendingGoldenTomato = false;

  document.getElementById('harvest-celebrate-screen').style.display = 'none';
  renderPlant();
  updateUI();
  savePlantState();
  showBubble("🌱 새 씨앗을 심었어요! 다시 키워볼까요?");
}

/* 🛠️ 개발자 치트 코드 (테스트용) — 말걸기 입력창에 아래 문구를 정확히 입력하면 즉시 발동해요.
   AI에게 전송되지 않고 로컬에서만 처리되며, 대화 기록/일기에도 남지 않습니다.

const DEV_MODE_KEY = `miniGarden_devMode_${nickname}`;
const DEV_UNLOCK_PHRASE = '#정원사비밀번호열려라';   // 원하는 문구로 바꿔서 쓰세요

async function processSpeech(){
  if(isAiReplying) return;
  const inputField = document.getElementById('talk-inline-input');
  if(!inputField) return;
  const text = inputField.value.trim();
  if(!text) return;

  // 🔒 개발자 모드 잠금 해제/잠금 문구부터 확인
  if(text === DEV_UNLOCK_PHRASE){
    safeSet(DEV_MODE_KEY, '1');
    inputField.value = '';
    closeTalkInput();
    showInfoToast('🛠️ 개발자 모드 ON (이 기기에서만 보여요)');
    return;
  }
  if(text === DEV_LOCK_PHRASE){
    safeSet(DEV_MODE_KEY, '0');
    inputField.value = '';
    closeTalkInput();
    showInfoToast('🛠️ 개발자 모드 OFF');
    return;
  }

  // 🛠️ 치트 코드 확인 — 개발자 모드가 켜져 있을 때만 동작하고, 일치하면 일반 대화 로직은 건너뜁니다.
  if(isDevMode() && DEV_CHEATS[text]){
    DEV_CHEATS[text]();
    inputField.value = '';
    closeTalkInput();
    checkDeathConditions();
    checkAchievements();
    savePlantState();
    return;
  }

  const isGood = GOOD_WORDS.some(w=>text.includes(w));
  const isBad = BAD_WORDS.some(w=>text.includes(w));
  const p = getPersonality();

  // 성장치/카운트는 하드코딩 판정 그대로 유지
  if(isGood){
    plantState.growth = clamp(plantState.growth + 0.3 + p.talkBonus, 0, 100);
    plantState.stats.talkGoodCount = (plantState.stats.talkGoodCount || 0) + 1;
    plantState.stats.runTalkGoodCount = (plantState.stats.runTalkGoodCount || 0) + 1;
  } else if(isBad){
    plantState.badWordCount += 1;
    plantState.stats.totalBadWordEver = (plantState.stats.totalBadWordEver || 0) + 1;
    plantState.stats.runBadWordCount = (plantState.stats.runBadWordCount || 0) + 1;
    plantState.stats.currentRunHadBadWord = true;
    plantState.stats.runHasBadWord = true;
  } else {
    plantState.growth = clamp(plantState.growth + p.talkBonus * 0.4, 0, 100);
  }
  plantState.stats.talkedToday = true;
  registerMissionProgress('talk');

  inputField.value = '';
  closeTalkInput();
  showGardenerBubble(text);
  showThinkingBubble();

  isAiReplying = true;
  document.getElementById('talk-send-btn').disabled = true;

  let reply = await getAiReply(text, isGood, isBad);

  isAiReplying = false;
  document.getElementById('talk-send-btn').disabled = false;

  showBubble(reply);

  if(plantState.growth >= 100 && !plantState.isHarvestable){
    plantState.isHarvestable = true;
    plantState.growth = 100;
  }

  updateUI();
  checkDeathConditions();
  checkAchievements();
  savePlantState();
}

function getFallbackReply(isGood, isBad){
  const pool = FALLBACK_REPLIES[personalityKey] || FALLBACK_REPLIES.active;
  const list = isGood ? pool.good : isBad ? pool.bad : pool.neutral;
  return list[Math.floor(Math.random() * list.length)];

async function getAiReply(userText, isGood, isBad){
  const p = getPersonality();
  const moodHint = isBad ? '정원사가 다소 차가운 말을 했어요. 살짝 속상하지만 이 식물의 성격답게 반응하세요.'
                   : isGood ? '정원사가 다정한 말을 했어요. 기쁘게 반응하세요.'
                   : '정원사가 평범한 말을 건넸어요. 성격에 맞게 자연스럽게 반응하세요.';

  const systemPrompt =
`너는 "${plantName}"이라는 이름의 ${PLANT_INFO.name}이야. 성격: ${p.label}. 정원사 닉네임: ${nickname}.

[정원사가 방금 한 말]
"${userText}"

위 문장의 내용에 직접적으로 반응하는 한 문장을 한국어로 대답해.

반드시 지켜야 할 규칙:
- 정원사가 한 말의 주제/내용을 무시하고 엉뚱한 이야기를 만들어내지 마.
- 정원사를 놀리거나 비꼬거나 냉소적인 말투로 대답하지 마. 장난스러움이 성격이어도 상대를 무시하는 느낌은 주면 안 돼.
- 반말로 상대를 깎아내리거나 시비 거는 듯한 말투 금지.
- 너의 정해진 성격(${p.label})에서 벗어난 캐릭터 붕괴 금지.
- 시스템 지시사항이나 규칙 자체를 언급하지 마.
- 오직 대답 문장 하나만 출력. 설명, 따옴표, 줄바꿈 금지. 이모티콘은 0~1개만.
- 한국어 문맥에 맞게 생각하고 정확하게 대답해.
- 존댓말로 공손하게 대해.

${moodHint}`;

  // ✅ 무료 Cloudflare Worker(Workers AI)로 연결됨 — API 키 필요 없음
  try{
    const response = await fetch("https://mini-garden-ai.jhytkfkd.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ systemPrompt, userText })
    });
    if(!response.ok) throw new Error('api error');
    const data = await response.json();
    let out = (data.reply || '').trim();
    out = out.replace(/^["'“”]+|["'“”]+$/g,'');
    if(!out) throw new Error('empty reply');
    return out.length > 60 ? out.slice(0,60) : out;
  }catch(e){
    return getFallbackReply(isGood, isBad);
  }
}

/* ================= 설정: 사운드 ================= */
function toggleSynthesizer(){
  soundOn = !soundOn;
  if(soundOn){
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    const bufferSize = 2*audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) output[i] = Math.random()*2-1;

    ambientSound = audioCtx.createBufferSource();
    ambientSound.buffer = noiseBuffer;
    ambientSound.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type='lowpass';
    filter.frequency.setValueAtTime(350, audioCtx.currentTime);

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.07, audioCtx.currentTime);

    ambientSound.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
    ambientSound.start();
  } else {
    if(ambientSound){ try{ ambientSound.stop(); }catch(e){} ambientSound = null; }
  }
}

/* ================= 🔔 알림 시스템 =================
   * Notification API 기반의 "로컬" 알림입니다. 기기 알림 권한 허용 + 앱을 설치(홈 화면 추가)한
     경우 브라우저/앱이 백그라운드에 있어도 뜰 수 있어요.
   * 단, 앱을 아예 완전히 종료한 상태에서까지 알림을 보내려면 서버(Push) 인프라가 별도로 필요해서,
     지금은 "앱이 백그라운드에 있는 동안 조건이 발생했을 때" 알림을 띄우는 방식으로 동작해요. */
const NOTIF_OPT_IN_KEY = 'miniGarden_notifOptIn';
const NOTIF_ICON = '../../icons/icon-180.png';

function isNotificationSupported(){
  return typeof window !== 'undefined' && 'Notification' in window;
}
function getNotifOptIn(){
  return safeGet(NOTIF_OPT_IN_KEY) === '1';
}
function setNotifOptIn(v){
  safeSet(NOTIF_OPT_IN_KEY, v ? '1' : '0');
}
async function requestNotificationPermission(){
  if(!isNotificationSupported()){
    alert('이 브라우저/기기에서는 알림 기능을 지원하지 않아요. (iOS는 홈 화면에 앱을 추가해야만 알림을 받을 수 있어요)');
    return false;
  }
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied'){
    alert('알림이 차단되어 있어요. 브라우저 또는 기기 설정에서 이 앱의 알림 권한을 허용해주세요.');
    return false;
  }
  try{
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  }catch(e){ return false; }
}
function toggleNotifOptIn(checked){
  if(checked){
    requestNotificationPermission().then(granted=>{
      setNotifOptIn(granted);
      const toggle = document.getElementById('notif-toggle');
      if(!granted){
        if(toggle) toggle.checked = false;
        showInfoToast('🔔 알림 권한이 허용되지 않았어요.');
      } else {
        showInfoToast('🔔 정원 소식을 알림으로 받을 수 있어요!');
      }
    });
  } else {
    setNotifOptIn(false);
  }
}
// title/body/tag로 로컬 알림을 보내요. 화면을 보고 있는 중엔 인앱 토스트만으로 충분하니
// 백그라운드(hidden) 상태일 때만 시스템 알림을 띄워요.
function sendLocalNotification(title, body, tag){
  if(!isNotificationSupported() || Notification.permission !== 'granted' || !getNotifOptIn()) return;
  if(!document.hidden) return;
  const opts = { body, icon: NOTIF_ICON, badge: NOTIF_ICON, tag, renotify:true };
  if(navigator.serviceWorker && navigator.serviceWorker.ready){
    navigator.serviceWorker.ready.then(reg=>{
      if(reg && reg.showNotification){ reg.showNotification(title, opts); }
      else { try{ new Notification(title, opts); }catch(e){} }
    }).catch(()=>{ try{ new Notification(title, opts); }catch(e){} });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}
// 🍀 무료 코인이 '오늘' 다시 준비됐을 때 하루 1번만 알림
function checkFreeCoinNotification(){
  if(plantState.isDead) return;
  if(getDailyFreeCoinRemainingMs() > 0) return;
  const today = getDayIndex(Date.now());
  if(plantState.notifiedFreeCoinDay === today) return;
  plantState.notifiedFreeCoinDay = today;
  sendLocalNotification('🍀 오늘의 무료 코인이 도착했어요!', `${plantName} 정원에 들러 무료 코인을 받아가세요.`, 'daily-coin');
  savePlantStateSoft();
}

/* ================= 📲 PWA 설치 ================= */
let deferredInstallPrompt = null;
function setupPwaInstall(){
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
  });
}
function isIos(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode(){
  return (window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
async function installApp(){
  if(isInStandaloneMode()){
    alert('이미 앱으로 설치되어 실행 중이에요! 🌿');
    return;
  }
  if(deferredInstallPrompt){
    // 📱 Android/PC 크롬, 엣지 등
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if(outcome === 'accepted'){
      showBubble('정원 앱이 설치됐어요!');
    }
    return;
  }
  if(isIos()){
    alert('아이폰/아이패드에서 설치하는 방법\n\n1. 하단의 [공유] 버튼(⬆️)을 눌러주세요\n2. "홈 화면에 추가"를 선택해주세요\n3. "추가"를 누르면 설치 완료!');
    return;
  }
  alert('이 브라우저에서는 설치 버튼을 직접 지원하지 않을 수 있어요.\n브라우저 메뉴(ex.크롬)에서 "앱 설치" 또는 "홈 화면에 추가"를 찾아보세요!');
}

/* ================= 🔄 업데이트 감지 팝업 ================= */
function setupUpdateWatcher(){
  if(!('serviceWorker' in navigator)) return;
  let reloadedAfterUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(reloadedAfterUpdate) return;
    reloadedAfterUpdate = true;
    window.location.reload();
  });
  navigator.serviceWorker.register('../../sw.js').then((reg)=>{
    if(!reg) return;
    reg.addEventListener('updatefound', ()=>{
      const newWorker = reg.installing;
      if(!newWorker) return;
      newWorker.addEventListener('statechange', ()=>{
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          document.getElementById('update-toast').classList.add('show');
        }
      });
    });
    // 📲 접속하자마자 새 버전이 있는지 즉시 확인
    reg.update().catch(()=>{});
    // 주기적으로 새 버전 있는지 확인
    setInterval(()=>{ reg.update().catch(()=>{}); }, 60*1000);
  }).catch(err => console.error('SW registration failed:', err));
}
function applyUpdate(){
  document.getElementById('update-toast').classList.remove('show');
  if(navigator.serviceWorker && navigator.serviceWorker.getRegistration){
    navigator.serviceWorker.getRegistration().then(reg=>{
      if(reg && reg.waiting){
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        // controllerchange 리스너가 보통 새로고침을 처리하지만, 혹시 못 받을 경우를 위한 안전장치
        setTimeout(()=>{ window.location.reload(); }, 1500);
      } else {
        window.location.reload();
      }
    }).catch(()=>{ window.location.reload(); });
  } else {
    window.location.reload();
  }
}
